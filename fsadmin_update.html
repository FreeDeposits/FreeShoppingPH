<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.I.A. | Command Center</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --ghost: #39ff14; --danger: #ff3131; --bg: #020408; --warning: #ffff00; }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--neon); padding: 15px; background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 25px; text-shadow: 0 0 10px var(--neon); }
        .op-card { background: rgba(0, 15, 25, 0.8); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .card-label { font-size: 11px; font-weight: 800; margin-bottom: 15px; color: var(--ghost); }
        textarea, input { width: 100%; background: #000; border: 1px solid var(--neon); color: var(--ghost); padding: 12px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; outline: none; }
        .btn-action { width: 100%; background: var(--neon); color: #000; border: none; padding: 12px; font-weight: 800; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .monitor-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .monitor-table th { text-align: left; padding: 10px; border-bottom: 1px solid var(--neon); }
        .monitor-table td { padding: 10px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); }
        .status-tag { padding: 2px 6px; border-radius: 3px; font-weight: 800; font-size: 9px; }
        .st-avail { border: 1px solid var(--ghost); color: var(--ghost); }
        .st-claim { border: 1px solid var(--danger); color: var(--danger); }
        .btn-mini { background: none; border: none; cursor: pointer; padding: 2px 5px; }
    </style>
</head>
<body>
    <header>
        <h1>[NEXUS_ADMIN_TERMINAL]</h1>
        <div style="font-size: 10px; color: var(--ghost);">SYSTEM STATUS: SECURE</div>
    </header>

    <div class="op-card">
        <div class="card-label">● DEPLOY_REDIRECT_LINKS</div>
        <textarea id="links" rows="3" placeholder="PASTE GCASH LINKS HERE (ONE PER LINE)"></textarea>
        <button class="btn-action" onclick="deploy()">DEPLOY TO DATABASE</button>
    </div>

    <div class="op-card">
        <div class="card-label">● LIVE_MONITORING</div>
        <table class="monitor-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>STATUS</th>
                    <th>USER</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="linkData"></tbody>
        </table>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function deploy() {
            const val = document.getElementById('links').value.trim();
            if(!val) return alert("Walang link!");
            
            const urlArray = val.split('\n');
            urlArray.forEach(url => {
                if(url.trim()) {
                    db.ref('links').push({
                        url: url.trim(),
                        status: 'available',
                        user: 'NONE',
                        timestamp: Date.now()
                    });
                }
            });
            document.getElementById('links').value = '';
        }

        function reuse(key) {
            db.ref('links/' + key).update({ status: 'available', user: 'NONE' });
        }

        function remove(key) {
            if(confirm("DELETE?")) db.ref('links/' + key).remove();
        }

        // Listener para sa listahan
        db.ref('links').on('value', snap => {
            const tbody = document.getElementById('linkData');
            tbody.innerHTML = '';
            snap.forEach(c => {
                const d = c.val();
                const sClass = d.status === 'available' ? 'st-avail' : 'st-claim';
                tbody.innerHTML += `<tr>
                    <td>#${c.key.substr(-5)}</td>
                    <td><span class="status-tag ${sClass}">${d.status.toUpperCase()}</span></td>
                    <td style="color:#fff">${d.user}</td>
                    <td>
                        <button class="btn-mini" onclick="reuse('${c.key}')" style="color:var(--warning)">[REUSE]</button>
                        <button class="btn-mini" onclick="remove('${c.key}')" style="color:var(--danger)">[X]</button>
                    </td>
                </tr>`;
            });
        });
    </script>
</body>
</html>
