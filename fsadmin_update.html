<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS ADMIN | DISCO MODE</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --blue: #0038a8; --red: #ce1126; --yellow: #fcd116; --green: #00b159; 
            --reflect-color: rgba(0,0,0,0);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Public Sans', sans-serif; }
        
        body { 
            background: #cbd5e0; 
            transition: box-shadow 0.5s ease;
            min-height: 100vh;
            box-shadow: inset 0 -100px 150px -50px var(--reflect-color);
        }

        /* --- HEADER --- */
        .header { background: white; padding: 30px 10px 15px; text-align: center; border-bottom: 4px solid #eee; position: relative; z-index: 10; }
        .lights { position: absolute; top: 0; left: 0; width: 100%; height: 8px; display: flex; }
        .l-unit { flex: 1; opacity: 0; transition: 0.3s; }

        .mode-on .l-y1, .mode-on .l-y2 { background: var(--yellow); opacity: 1; animation: disco 0.3s infinite alternate; }
        .mode-on .l-g1, .mode-on .l-g2 { background: var(--green); opacity: 1; animation: disco 0.3s infinite alternate-reverse; }
        .mode-on { --reflect-color: rgba(252, 209, 22, 0.3); border-bottom-color: var(--green); }

        .mode-off .l-r1, .mode-off .l-r2 { background: var(--red); opacity: 1; animation: blink 0.4s infinite alternate; }
        .mode-off .l-b1, .mode-off .l-b2 { background: var(--blue); opacity: 1; animation: blink 0.4s infinite alternate-reverse; }
        .mode-off { --reflect-color: rgba(206, 17, 38, 0.3); border-bottom-color: var(--blue); }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        @keyframes disco { from { filter: brightness(1.2); transform: scaleY(1.2); } to { filter: brightness(0.8); transform: scaleY(1); } }

        /* --- UI COMPONENTS --- */
        #auth-overlay { position: fixed; inset: 0; background: #f0f2f5; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { padding: 12px; display: none; }
        
        /* Accordion Logic */
        details { background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #a0aec0; overflow: hidden; }
        summary { padding: 18px; font-weight: 900; font-size: 14px; cursor: pointer; background: #edf2f7; list-style: none; }
        summary::-webkit-details-marker { display: none; }

        /* --- LIVE MONITORING LOGS --- */
        .log-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .log-center { text-align: center; flex: 1; }
        
        /* Active Status Animation */
        .status-active { color: var(--green); font-weight: 900; animation: pulseGreen 1.5s infinite ease-in-out; }
        .status-init { color: var(--blue); font-weight: 900; }
        
        @keyframes pulseGreen {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .beneficiary-click { 
            display: block; margin-top: 5px; color: #4a5568; font-weight: 900; 
            text-decoration: underline; cursor: pointer; font-size: 14px; 
        }

        /* --- LEVER TOGGLE --- */
        .control-panel { display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 15px; border-radius: 12px; }
        .lever-box { position: relative; width: 45px; height: 80px; background: #1a202c; border-radius: 8px; border: 4px solid #4a5568; }
        .lever-input { opacity: 0; width: 100%; height: 100%; position: absolute; z-index: 5; cursor: pointer; }
        .lever-handle { position: absolute; left: 50%; transform: translateX(-50%); width: 16px; height: 40px; border-radius: 20px; transition: 0.2s; }
        .lever-input:not(:checked) + .lever-handle { bottom: 8px; background: #718096; }
        .lever-input:checked + .lever-handle { top: 8px; background: var(--green); box-shadow: 0 0 15px var(--green); }

        .phone-field { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 18px; font-weight: 900; text-align: center; outline: none; }
        .btn-app { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 900; color: white; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay">
        <h2 style="margin-bottom:15px;">ADMIN LOGIN</h2>
        <input type="password" id="admin_pw" placeholder="Enter PIN" style="padding:12px; text-align:center; border-radius:10px; border:2px solid #cbd5e1; margin-bottom:15px; width: 200px;">
        <button class="btn-app" style="background:#0038a8; width:200px" onclick="attemptLogin()">UNLOCK</button>
    </div>

    <div class="header" id="header_ui">
        <div class="lights">
            <div class="l-unit l-r1 l-y1"></div>
            <div class="l-unit l-b1 l-g1"></div>
            <div class="l-unit l-r2 l-y2"></div>
            <div class="l-unit l-b2 l-g2"></div>
        </div>
        <h1 style="font-size: 22px;">FREESHOPPING PH</h1>
        <p id="status_text" style="font-size:10px; margin-top:5px; font-weight:900"></p>
    </div>

    <div class="container" id="admin_ui">
        <details id="sec1">
            <summary onclick="manageAccordion('sec1')">1. PORTAL MANAGEMENT (INPUT LINKS)</summary>
            <div style="padding:12px">
                <input type="text" id="portal_url" placeholder="Paste GCash URL..." style="width:100%; padding:15px; border-radius:10px; border:2px solid #ddd; margin-bottom:10px;">
                <button class="btn-app" style="background:#0038a8" onclick="addPortal()">ADD TO DATABASE</button>
            </div>
        </details>

        <details id="sec2" open>
            <summary onclick="manageAccordion('sec2')">2. LIVE MONITORING & LOGS</summary>
            <div id="logs_container" style="padding:10px"></div>
        </details>

        <details id="sec3">
            <summary onclick="manageAccordion('sec3')">3. SYSTEM ACCESS CONTROL</summary>
            <div style="padding:12px">
                <div class="control-panel">
                    <div class="lever-box">
                        <input type="checkbox" id="strict_toggle" class="lever-input" onchange="updateMode()">
                        <div class="lever-handle"></div>
                    </div>
                    <input type="tel" id="phone_num" maxlength="11" placeholder="09XXXXXXXXX" class="phone-field" oninput="autoScan(this.value)">
                </div>
                <div id="dynamic_btn" style="margin-top:10px;"></div>
                <button class="btn-app" style="background:#2d3748" onclick="saveToDb('blacklist')">RESTRICTED (BLACKLIST)</button>
            </div>
        </details>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
            authDomain: "freeshoppingph-3bade.firebaseapp.com",
            databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
            projectId: "freeshoppingph-3bade",
            storageBucket: "freeshoppingph-3bade.appspot.com",
            messagingSenderId: "1028308831969",
            appId: "1:1028308831969:web:96e224e75d69ba74332924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- ACCORDION LOGIC ---
        function manageAccordion(openId) {
            const sections = ['sec1', 'sec2', 'sec3'];
            sections.forEach(id => {
                if(id !== openId) document.getElementById(id).removeAttribute('open');
            });
        }

        window.onload = () => { if(localStorage.getItem("admin_auth") === "granted") unlockApp(); };
        
        async function attemptLogin() {
            const p = document.getElementById('admin_pw').value;
            const s = await db.ref('admin_settings/password').once('value');
            if(p === (s.val() || "1234")) { localStorage.setItem("admin_auth", "granted"); unlockApp(); }
            else alert("Mali!");
        }

        function unlockApp() { 
            document.getElementById('auth-overlay').style.display='none'; 
            document.getElementById('admin_ui').style.display='block'; 
        }

        function romanize(n) { 
            const m={V:5,IV:4,I:1}; let r=''; 
            for(let i in m){while(n>=m[i]){r+=i;n-=m[i]}} return r; 
        }

        // --- MONITORING LOGIC ---
        db.ref('AvailLinks').on('value', snap => {
            const container = document.getElementById('logs_container'); 
            container.innerHTML = ''; let i=1;
            snap.forEach(c => {
                const d = c.val(); 
                const active = d.status === 'available';
                const phone = d.beneficiary || 'None';
                
                container.innerHTML += `
                <div class="log-box">
                    <div style="font-size:10px; width:60px"><b>GCLink#${romanize(i)}</b></div>
                    
                    <div class="log-center">
                        <span class="${active?'status-active':'status-init'}">[${active?'ACTIVE':'INITIATED'}]</span>
                        ${phone !== 'None' && phone !== 'NONE' ? `<span class="beneficiary-click" onclick="copyToForm('${phone}')">${phone}</span>` : `<span style="display:block; font-size:12px; color:gray; margin-top:5px;">Waiting...</span>`}
                    </div>

                    <div style="text-align:right; width:60px">
                        <span style="color:orange; font-size:10px; cursor:pointer; display:block; margin-bottom:5px" onclick="reuse('${c.key}')">REUSE</span>
                        <span style="color:red; font-size:10px; cursor:pointer" onclick="removeLink('${c.key}')">REMOVE</span>
                    </div>
                </div>`; 
                i++;
            });
        });

        function copyToForm(num) {
            // Jump to System Access Section
            manageAccordion('sec3');
            document.getElementById('sec3').setAttribute('open', 'true');
            // Fill up and scan
            const field = document.getElementById('phone_num');
            field.value = num;
            autoScan(num);
            // Scroll down
            field.scrollIntoView({ behavior: 'smooth' });
        }

        async function autoScan(v) {
            if(v.length === 11) {
                const btn = document.getElementById('dynamic_btn');
                const snap = await db.ref('whitelist/'+v).once('value');
                if(snap.exists()) btn.innerHTML = `<button class="btn-app" style="background:#ce1126" onclick="deleteAccess('${v}')">REMOVE ACCESS</button>`;
                else btn.innerHTML = `<button class="btn-app" style="background:#00b159" onclick="saveToDb('whitelist')">GAIN ACCESS</button>`;
            }
        }

        function saveToDb(path) { const p = document.getElementById('phone_num').value; db.ref(path+'/'+p).set({time:Date.now()}); autoScan(p); }
        function deleteAccess(p) { db.ref('whitelist/'+p).remove(); db.ref('blacklist/'+p).remove(); autoScan(p); }
        function updateMode() { db.ref('system_status').update({mode: document.getElementById('strict_toggle').checked?'strict':'open'}); }
        
        db.ref('system_status').on('value', snap => {
            const m = snap.val()?.mode || 'strict';
            const isStrict = (m === 'strict');
            document.getElementById('strict_toggle').checked = isStrict;
            const header = document.getElementById('header_ui');
            const body = document.getElementById('main-body');
            
            if(isStrict) {
                header.className = "header mode-on";
                document.getElementById('status_text').innerText = "STRICT MODE: YELLOW/GREEN";
                body.style.setProperty('--reflect-color', 'rgba(0, 177, 89, 0.2)');
            } else {
                header.className = "header mode-off";
                document.getElementById('status_text').innerText = "OPEN MODE: RED/BLUE";
                body.style.setProperty('--reflect-color', 'rgba(206, 17, 38, 0.2)');
            }
        });

        function reuse(k) { db.ref('AvailLinks/'+k).update({status:'available', beneficiary:'NONE'}); }
        function removeLink(k) { db.ref('AvailLinks/'+k).remove(); }
        function addPortal() { 
            const u = document.getElementById('portal_url').value; 
            if(u) db.ref('AvailLinks').push({url:u, status:'available', beneficiary:'NONE'}); 
            document.getElementById('portal_url').value = ''; 
        }
    </script>
</body>
</html>
