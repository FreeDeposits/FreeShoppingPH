<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ADMIN | Dispatcher</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Public+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f13; color: #f0f6fc; font-family: 'Public Sans', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #161b22; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #30363d; }
        h2 { font-size: 14px; color: #40916c; margin-bottom: 15px; text-transform: uppercase; }
        textarea, input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-family: 'JetBrains Mono'; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: #238636; color: white; }
        .slot { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #30363d; }
        .in-use { border-left-color: #f85149; }
        .avail { border-left-color: #2ea043; }
        .slot-info { font-size: 11px; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-rec { background: #d29922; color: black; font-size: 10px; flex: 2; }
        .btn-del { background: transparent; border: 1px solid #f85149; color: #f85149; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:#40916c; font-size:20px; margin-bottom:20px;">NEXUS DISPATCHER</h1>

    <div class="card">
        <h2>Add New Merchant Link</h2>
        <textarea id="newLink" placeholder="Paste GCash/Merchant link here..."></textarea>
        <button class="btn btn-add" onclick="addLink()">Deploy Link</button>
    </div>

    <div class="card">
        <h2>Live Monitor (Queue)</h2>
        <div id="monitor"></div>
    </div>

    <div class="card">
        <h2>Ban Management</h2>
        <input type="text" id="banPhone" placeholder="Phone Number to Ban">
        <button class="btn" style="background:#f85149; color:white;" onclick="banUser()">Block Access</button>
        <div id="banList" style="margin-top:10px; font-size:12px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
        authDomain: "freeshoppingph-3bade.firebaseapp.com",
        databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
        projectId: "freeshoppingph-3bade",
        storageBucket: "freeshoppingph-3bade.firebasestorage.app",
        messagingSenderId: "858532604838",
        appId: "1:858532604838:web:59a6a0f31d63c2cdda7d67"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addLink() {
        const url = document.getElementById('newLink').value;
        if(!url) return;
        db.ref('links').push({ url, status: 'available', claimedBy: 'NONE' });
        document.getElementById('newLink').value = '';
    }

    function recycle(key) {
        db.ref('links/' + key).update({ status: 'available', claimedBy: 'NONE' });
    }

    function remove(key) {
        if(confirm("Delete link?")) db.ref('links/' + key).remove();
    }

    function banUser() {
        const p = document.getElementById('banPhone').value;
        if(p) db.ref('banned_ghosts/' + p).set(true);
        document.getElementById('banPhone').value = '';
    }

    // Monitor Listener
    db.ref('links').on('value', snap => {
        const cont = document.getElementById('monitor');
        cont.innerHTML = '';
        snap.forEach(child => {
            const d = child.val();
            const isUsed = d.status === 'in-use';
            cont.innerHTML += `
                <div class="slot ${isUsed ? 'in-use' : 'avail'}">
                    <div class="slot-info">
                        <strong>STATUS:</strong> ${d.status.toUpperCase()}<br>
                        <strong>USER:</strong> ${d.claimedBy}<br>
                        <span style="color:#58a6ff;">${d.url.substring(0,30)}...</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-rec" onclick="recycle('${child.key}')">♻️ RECYCLE / MAKE AVAILABLE</button>
                        <button class="btn btn-del" onclick="remove('${child.key}')">DEL</button>
                    </div>
                </div>
            `;
        });
    });

    // Ban List Listener
    db.ref('banned_ghosts').on('value', snap => {
        const list = document.getElementById('banList');
        list.innerHTML = '<strong>Banned:</strong> ';
        snap.forEach(c => {
            list.innerHTML += `${c.key} <span style="cursor:pointer; color:red" onclick="db.ref('banned_ghosts/${c.key}').remove()">[X]</span>, `;
        });
    });
</script>
</body>
</html>
