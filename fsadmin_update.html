<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Admin Booking System</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00e5ff; 
            --bg-dark: #090b10; 
            --card-bg: #11151f;
            --success: #00ff88; 
            --danger: #ff3366; 
            --warning: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #8b9bb4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            padding: 15px;
            padding-bottom: 40px;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--warning); }
            50% { box-shadow: 0 0 15px var(--warning); }
            100% { box-shadow: 0 0 5px var(--warning); }
        }

        header { 
            margin-bottom: 25px; 
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            animation: slideIn 0.3s ease;
        }
        h1 { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--primary); font-weight: 800; text-shadow: 0 0 10px rgba(0,229,255,0.3); }
        .sub-deck { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

        .op-card {
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease forwards;
            opacity: 0;
        }
        .op-card:nth-child(2) { animation-delay: 0.1s; }
        .op-card:nth-child(3) { animation-delay: 0.2s; }

        .card-label { 
            font-size: 14px; 
            font-weight: 800; 
            margin-bottom: 15px; 
            color: var(--text-main); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        textarea, input {
            width: 100%; 
            background: rgba(0,0,0,0.5); 
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--primary); 
            padding: 15px; 
            border-radius: 8px; 
            outline: none; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px; 
            margin-bottom: 15px;
            transition: 0.3s;
        }
        textarea:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,229,255,0.2); }

        .btn-action {
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            border: none;
            padding: 16px; 
            font-weight: 800; 
            font-size: 14px;
            cursor: pointer; 
            border-radius: 8px;
            text-transform: uppercase; 
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-action:active { transform: scale(0.98); }
        .btn-action:hover { box-shadow: 0 0 15px var(--primary); }
        
        .btn-ban { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-ban:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        /* Slot Item Design (Booking Look) */
        .slot-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: 0.3s;
        }
        .slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slot-id { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim); }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .st-avail { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }
        .st-pend { background: rgba(255, 204, 0, 0.1); color: var(--warning); border: 1px solid var(--warning); animation: pulse 2s infinite; }
        
        .slot-actions { display: flex; gap: 8px; }
        .btn-retrieve {
            flex: 1;
            background: var(--warning);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 12px;
        }
        .btn-delete {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 15px;
            border-radius: 6px;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .counter { font-size: 12px; color: var(--primary); background: rgba(0,229,255,0.1); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>[NEXUS_BOOKING_SYS]</h1>
        <div class="sub-deck">CONNECTION: SECURE // ROLE: ADMIN</div>
    </header>

    <div class="op-card">
        <div class="card-label">
            <span>ADD NEW SLOTS</span>
            <span class="counter" id="linkCounter">0 / 5 LINKS</span>
        </div>
        <textarea id="links" rows="2" placeholder="Paste link here... (Max 5 total slots)"></textarea>
        <button class="btn-action" onclick="deploy()">🚀 DEPLOY LINK</button>
    </div>

    <div class="op-card">
        <div class="card-label">ACTIVE BOOKING SLOTS</div>
        <div id="slotContainer">
            </div>
    </div>

    <div class="op-card" style="border-top: 2px solid var(--danger);">
        <div class="card-label" style="color: var(--danger);">TERMINATION PROTOCOL</div>
        <input type="text" id="banTarget" placeholder="Enter User ID / Phone to ban">
        <button class="btn-action btn-ban" onclick="banGhost()">BLOCK USER</button>
        
        <div style="margin-top: 20px;" id="banContainer">
            </div>
    </div>

    <div id="toast">Notification</div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentTotalLinks = 0;

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function deploy() {
        const val = document.getElementById('links').value.trim();
        if(!val) return;
        
        const urls = val.split('\n').filter(u => u.trim() !== '');
        
        if (currentTotalLinks + urls.length > 5) {
            showToast("ERROR: Maximum of 5 links allowed!", true);
            return;
        }

        urls.forEach(url => {
            db.ref('links').push({ url: url.trim(), status: 'available', user: 'NONE', timestamp: Date.now() });
        });
        
        document.getElementById('links').value = '';
        showToast("Link successfully deployed!");
    }

    function retrieveContract(key) {
        if(confirm("Force retrieve this link? This will kick the current idle user and make it available again.")) {
            db.ref('links/' + key).update({ status: 'available', user: 'NONE' });
            showToast("Link Retrieved. Now available.");
        }
    }

    function deleteContract(key) {
        if(confirm("Remove this slot permanently?")) {
            db.ref('links/' + key).remove();
        }
    }

    function banGhost() {
        const target = document.getElementById('banTarget').value.trim();
        if(!target) return;
        db.ref('banned_ghosts/' + target).set({ timestamp: Date.now() });
        document.getElementById('banTarget').value = '';
        showToast("User Terminated.", true);
    }

    function liftBan(id) {
        if(confirm("Unblock " + id + "?")) {
            db.ref('banned_ghosts/' + id).remove();
            showToast("User restored.");
        }
    }

    // --- REALTIME LISTENERS ---

    db.ref('links').on('value', snap => {
        const container = document.getElementById('slotContainer');
        const counter = document.getElementById('linkCounter');
        
        container.innerHTML = '';
        currentTotalLinks = snap.numChildren();
        counter.innerText = `${currentTotalLinks} / 5 LINKS`;

        if(currentTotalLinks === 0) {
            container.innerHTML = '<div style="text-align:center; color:var(--text-dim); font-size:12px; padding: 20px;">NO ACTIVE SLOTS</div>';
        }

        snap.forEach(c => {
            const d = c.val();
            const isAvailable = d.status === 'available';
            
            // Design logic: If pending, show IN USE warning and RETRIEVE button
            let statusBadge = isAvailable ? 
                `<span class="status-badge st-avail">AVAILABLE</span>` : 
                `<span class="status-badge st-pend">⚠️ IN USE BY: ${d.user}</span>`;

            let actionButtons = isAvailable ? 
                `<button class="btn-delete" onclick="deleteContract('${c.key}')" style="width:100%;">🗑️ REMOVE SLOT</button>` :
                `<button class="btn-retrieve" onclick="retrieveContract('${c.key}')">🔄 RETRIEVE SLOT</button>
                 <button class="btn-delete" onclick="deleteContract('${c.key}')">🗑️</button>`;

            container.innerHTML += `
                <div class="slot-item">
                    <div class="slot-header">
                        <span class="slot-id">ID: ...${c.key.substr(-6)}</span>
                        ${statusBadge}
                    </div>
                    <div class="slot-actions">
                        ${actionButtons}
                    </div>
                </div>
            `;
        });
    });

    db.ref('banned_ghosts').on('value', snap => {
        const container = document.getElementById('banContainer');
        container.innerHTML = '';
        snap.forEach(c => {
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,51,102,0.1); padding:10px; border-radius:6px; margin-bottom:5px;">
                    <span style="color:var(--danger); font-size:12px; font-weight:bold;">${c.key}</span>
                    <button onclick="liftBan('${c.key}')" style="background:transparent; border:none; color:var(--text-dim); font-size:11px; cursor:pointer;">[UNBAN]</button>
                </div>
            `;
        });
    });
</script>
</body>
</html>
