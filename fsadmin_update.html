<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Admin Multi-Reg</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ph-blue: #0038a8; --ph-red: #ce1126; --ph-yellow: #fcd116; --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background: #f1f5f9; 
            min-height: 100vh; 
            color: var(--dark);
        }

        /* --- PHILIPPINE FLAG TITLE DESIGN --- */
        .header-app {
            padding: 45px 20px 25px;
            text-align: center;
            background: white;
            border-bottom: 5px solid var(--ph-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        .flag-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 26px;
            font-weight: 900;
            display: inline-block;
            background: linear-gradient(to bottom, 
                var(--ph-blue) 0%, var(--ph-blue) 40%, 
                #fff 40%, var(--ph-yellow) 50%, 
                var(--ph-red) 60%, var(--ph-red) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* --- MOBILE APP LAYOUT --- */
        .container { padding: 15px; margin-top: 10px; }

        details {
            background: white;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 22px;
            font-weight: 800;
            font-size: 14px;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #475569;
            cursor: pointer;
        }

        summary::after { content: '＋'; color: var(--ph-blue); font-weight: 900; transition: 0.3s; }
        details[open] summary { background: #f8fafc; color: var(--ph-blue); }
        details[open] summary::after { content: '－'; transform: rotate(180deg); }

        .content { 
            padding: 0 20px 20px 20px; 
            border-top: 1px solid #f1f5f9; 
            padding-top: 15px; 
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI COMPONENTS --- */
        .btn-app {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 10px;
        }

        .btn-primary { background: var(--ph-blue); color: white; }
        .btn-auth { background: var(--dark); color: var(--ph-yellow); border: 2px solid var(--ph-yellow); }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: var(--ph-red); color: white; }

        .btn-app:active { transform: scale(0.96); opacity: 0.9; }

        input, textarea {
            width: 100%; background: #f8fafc; border: 2px solid #e2e8f0;
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            outline: none; font-size: 14px; font-family: inherit;
        }

        /* --- REGISTERED DEVICE LIST --- */
        .dev-card {
            background: #f1f5f9; padding: 12px; border-radius: 12px;
            margin-top: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--ph-blue);
        }

        .dev-info b { font-size: 13px; color: var(--dark); display: block; }
        .dev-info span { font-size: 10px; color: #64748b; font-family: monospace; }

        /* --- AMBULANCE LIGHTS --- */
        .lights { position: fixed; top: 0; width: 100%; height: 6px; display: flex; z-index: 999; }
        .l-red { flex: 1; background: var(--ph-red); animation: blink 0.5s infinite alternate; }
        .l-blue { flex: 1; background: var(--ph-blue); animation: blink 0.5s infinite alternate-reverse; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }

    </style>
</head>
<body>

    <div class="lights"><div class="l-red"></div><div class="l-blue"></div></div>

    <div class="header-app">
        <h1 class="flag-text">FreeShoppingPH Admin</h1>
        <div style="margin-top: 10px;">
            <p style="font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 1px;">
                MY SIGNATURE: <span id="sigDisplay" style="color: var(--ph-blue);">SCANNING...</span>
            </p>
        </div>
    </div>

    <div class="container">

        <details class="exclusive-tab">
            <summary>Claiming Portal Management</summary>
            <div class="content">
                <textarea id="gcashLink" rows="2" placeholder="Paste GCash Link Here..."></textarea>
                <button class="btn-app btn-primary" onclick="assignLink()">ASSIGN PORTAL LINK</button>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>Live Monitoring</summary>
            <div class="content">
                <p style="font-size: 11px; color: gray; text-align: center;">Recent Links & Beneficiaries</p>
                <div id="monitoringList" style="margin-top:10px;"></div>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>System Access Control</summary>
            <div class="content">
                <button class="btn-app btn-danger" id="masterBtn" onclick="toggleSystem()">STRICT MODE ACTIVE</button>
                <div style="margin-top: 20px;">
                    <input type="tel" id="whiteNum" placeholder="Whitelist: 09xxxxxxxxx">
                    <button class="btn-app btn-success" onclick="addWhitelist()">ALLOW PHONE NUMBER</button>
                </div>
            </div>
        </details>

        <details class="exclusive-tab" open> <summary>Authorize Admin Devices</summary>
            <div class="content">
                <p style="font-size: 11px; color: #64748b; margin-bottom: 15px;">
                    Register this device to allow access when "Admin Lock" is active.
                </p>
                
                <input type="text" id="devName" placeholder="Device Name (e.g. My Phone 1)">
                <button class="btn-app btn-auth" onclick="registerDevice()">AUTHORIZE THIS DEVICE</button>

                <div style="margin-top: 25px;">
                    <p style="font-size: 11px; font-weight: 900; color: #475569; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px;">REGISTERED ADMINS:</p>
                    <div id="adminList"></div>
                </div>
            </div>
        </details>

    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
            authDomain: "freeshoppingph-3bade.firebaseapp.com",
            databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
            projectId: "freeshoppingph-3bade",
            storageBucket: "freeshoppingph-3bade.appspot.com",
            messagingSenderId: "1028308831969",
            appId: "1:1028308831969:web:96e224e75d69ba74332924"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 1. UNIQUE SIGNATURE GENERATOR ---
        function generateSignature() {
            // Gumagamit ng combination ng device info para maging unique per device model
            const info = navigator.userAgent + screen.width + screen.height + navigator.hardwareConcurrency;
            const hash = btoa(info).substring(0, 14);
            document.getElementById('sigDisplay').innerText = hash;
            return hash;
        }
        const mySignature = generateSignature();

        // --- 2. MULTI-DEVICE REGISTRATION (PUSH LOGIC) ---
        function registerDevice() {
            const name = document.getElementById('devName').value.trim();
            if(!name) return alert("Paki-lagyan ng pangalan ang device.");

            // .push() ensures na hindi ma-overwrite ang ibang devices
            db.ref('authorized_admins').push({
                deviceName: name,
                signature: mySignature,
                registeredAt: Date.now()
            }).then(() => {
                alert(name + " registered successfully!");
                document.getElementById('devName').value = '';
            });
        }

        // --- 3. DISPLAY REGISTERED DEVICES (REALTIME) ---
        db.ref('authorized_admins').on('value', snap => {
            const list = document.getElementById('adminList');
            list.innerHTML = '';
            if(!snap.exists()) {
                list.innerHTML = '<p style="font-size:10px; color:gray; padding-top:10px;">No devices found.</p>';
                return;
            }
            snap.forEach(child => {
                const data = child.val();
                const isMe = data.signature === mySignature ? '<b style="color:green">(YOU)</b>' : '';
                list.innerHTML += `
                    <div class="dev-card">
                        <div class="dev-info">
                            <b>${data.deviceName} ${isMe}</b>
                            <span>SIG: ${data.signature}</span>
                        </div>
                        <button onclick="removeAdmin('${child.key}')" style="background:none; border:none; color:red; font-weight:900; font-size:12px;">✕</button>
                    </div>
                `;
            });
        });

        function removeAdmin(key) {
            if(confirm("Alisin ang access ng device na ito?")) {
                db.ref('authorized_admins/' + key).remove();
            }
        }

        // --- 4. EXCLUSIVE ACCORDION LOGIC ---
        const allTabs = document.querySelectorAll('.exclusive-tab');
        allTabs.forEach(tab => {
            tab.addEventListener('toggle', function() {
                if (this.open) {
                    allTabs.forEach(t => { if (t !== this) t.removeAttribute('open'); });
                }
            });
        });

        // --- 5. SYSTEM TOGGLE (STRICT/OPEN) ---
        db.ref('system_status').on('value', snap => {
            const mode = snap.val()?.mode || 'strict';
            const btn = document.getElementById('masterBtn');
            if (mode === 'open') {
                btn.innerText = "SYSTEM: OPEN ACCESS";
                btn.style.background = "#3b82f6";
            } else {
                btn.innerText = "SYSTEM: STRICT MODE";
                btn.style.background = "var(--ph-red)";
            }
        });

        function toggleSystem() {
            const current = document.getElementById('masterBtn').innerText;
            const newMode = current.includes("STRICT") ? "open" : "strict";
            db.ref('system_status').update({ mode: newMode });
        }

        // --- 6. WHITELIST & PORTAL LOGIC ---
        async function assignLink() {
            const url = document.getElementById('gcashLink').value.trim();
            if(!url) return;
            await db.ref('AvailLinks').push({ url, status: 'available', beneficiary: 'NONE', time: Date.now() });
            document.getElementById('gcashLink').value = '';
            alert("Portal Link Assigned!");
        }

        function addWhitelist() {
            const num = document.getElementById('whiteNum').value.trim();
            if(num.length < 11) return alert("Invalid Number");
            db.ref('whitelist/' + num).set({ addedAt: Date.now() });
            alert("Number Whitelisted!");
            document.getElementById('whiteNum').value = '';
        }

    </script>
</body>
</html>
