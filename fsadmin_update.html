<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Admin App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ph-blue: #0038a8;
            --ph-red: #ce1126;
            --ph-yellow: #fcd116;
            --glass: rgba(255, 255, 255, 0.9);
            --dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background: #f1f5f9; 
            min-height: 100vh; 
            color: var(--dark);
            display: none; /* Hidden until authenticated */
        }

        /* --- PH FLAG TITLE DESIGN --- */
        .header-app {
            padding: 40px 20px 20px;
            text-align: center;
            background: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .flag-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 28px;
            font-weight: 900;
            display: inline-block;
            background: linear-gradient(to bottom, 
                var(--ph-blue) 0%, 
                var(--ph-blue) 40%, 
                white 40%, 
                white 50%, 
                var(--ph-yellow) 50%, 
                var(--ph-yellow) 60%, 
                var(--ph-red) 60%, 
                var(--ph-red) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            letter-spacing: -1px;
        }

        /* --- MOBILE APP UI --- */
        .container { padding: 15px; }

        details {
            background: white;
            border-radius: 18px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        summary {
            padding: 18px;
            font-weight: 800;
            font-size: 14px;
            list-style: none;
            display: flex;
            justify-content: space-between;
            color: #475569;
        }

        summary::after { content: '→'; color: var(--ph-blue); transition: 0.3s; }
        details[open] summary { background: #f8fafc; color: var(--ph-blue); }
        details[open] summary::after { transform: rotate(90deg); }

        .content { padding: 15px; border-top: 1px solid #f1f5f9; }

        /* --- BUTTONS REMASTERED --- */
        .btn-app {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary { background: var(--ph-blue); color: white; box-shadow: 0 4px 12px rgba(0,56,168,0.3); }
        .btn-auth { background: var(--dark); color: var(--ph-yellow); margin-top: 10px; }
        .btn-sec-green { background: #10b981; color: white; }
        .btn-sec-red { background: var(--ph-red); color: white; }

        .btn-app:active { transform: scale(0.96); opacity: 0.9; }

        input, textarea {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 14px;
            border-radius: 12px;
            font-family: inherit;
            margin-bottom: 10px;
            outline: none;
        }

        /* --- AMBULANCE LIGHTS (TOP) --- */
        .lights { position: fixed; top: 0; width: 100%; height: 5px; display: flex; z-index: 10000; }
        .l-left { flex: 1; background: var(--ph-red); animation: blink 0.3s infinite alternate; }
        .l-right { flex: 1; background: var(--ph-blue); animation: blink 0.3s infinite alternate-reverse; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

        /* Auth Screen */
        #auth-screen {
            position: fixed; top:0; left:0; width: 100%; height: 100%; 
            background: white; z-index: 10001; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 class="flag-text">AUTHENTICATING...</h2>
        <p style="margin-top: 10px; font-size: 12px; color: #64748b;">Scanning Device Signature</p>
    </div>

    <div class="lights"><div class="l-left"></div><div class="l-right"></div></div>

    <div class="header-app">
        <h1 class="flag-text">FreeShoppingPH Admin</h1>
        <p style="font-size: 10px; font-weight: 800; color: #94a3b8; margin-top: 5px;">
            DEVICE SIGNATURE: <span id="mySig" style="color:var(--ph-blue)">---</span>
        </p>
    </div>

    <div class="container">
        
        <details class="admin-tab">
            <summary>Portal Link Management</summary>
            <div class="content">
                <textarea id="gcashLink" rows="2" placeholder="Paste GCash Link..."></textarea>
                <button class="btn-app btn-primary" onclick="assignLink()">ASSIGN LINK</button>
            </div>
        </details>

        <details class="admin-tab">
            <summary>Live Monitoring (Max 5)</summary>
            <div class="content">
                <div id="linksTableContainer">
                    </div>
            </div>
        </details>

        <details class="admin-tab">
            <summary>Security & Whitelist</summary>
            <div class="content">
                <input type="tel" id="whiteNum" placeholder="09xxxxxxxxx" oninput="checkWhitelistRealtime()">
                <button id="whiteBtn" class="btn-app btn-sec-green" onclick="handleWhitelistAction()">GAIN ACCESS</button>
            </div>
        </details>

        <details class="admin-tab">
            <summary>Device Authorization</summary>
            <div class="content">
                <p style="font-size: 11px; margin-bottom: 10px;">Register this mobile device as a Primary Admin Key.</p>
                <button class="btn-app btn-auth" onclick="registerThisDevice()">AUTHORIZE ADMIN ACCESS</button>
            </div>
        </details>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
            authDomain: "freeshoppingph-3bade.firebaseapp.com",
            databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
            projectId: "freeshoppingph-3bade",
            storageBucket: "freeshoppingph-3bade.appspot.com",
            messagingSenderId: "1028308831969",
            appId: "1:1028308831969:web:96e224e75d69ba74332924"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- 1. DEVICE SIGNATURE LOGIC ---
        function getDeviceSignature() {
            const specs = [
                navigator.userAgent.length,
                screen.width + "x" + screen.height,
                navigator.hardwareConcurrency || 'N/A',
                navigator.language
            ].join('|');
            return btoa(specs).substring(0, 12); // Shortened Base64 signature
        }

        const mySignature = getDeviceSignature();
        document.getElementById('mySig').innerText = mySignature;

        // --- 2. AUTHENTICATION SHIELD ---
        async function authenticate() {
            const snap = await db.ref('admin_keys/' + mySignature).once('value');
            if (snap.exists()) {
                document.getElementById('auth-screen').style.display = 'none';
                document.body.style.display = 'block';
            } else {
                document.getElementById('auth-screen').innerHTML = `
                    <h2 style="color:red">ACCESS DENIED</h2>
                    <p>Device not authorized.</p>
                `;
                // window.close(); // Optional: closes the tab
            }
        }
        authenticate();

        function registerThisDevice() {
            if(confirm("Authorize this phone as Admin?")) {
                db.ref('admin_keys/' + mySignature).set({
                    registeredAt: Date.now(),
                    model: navigator.userAgent.substring(0, 20)
                }).then(() => alert("Device Authorized! Reloading..."));
                location.reload();
            }
        }

        // --- 3. EXCLUSIVE TAB LOGIC ---
        const tabs = document.querySelectorAll('.admin-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(otherTab => {
                    if (otherTab !== tab) otherTab.removeAttribute('open');
                });
            });
        });

        // --- 4. CORE FUNCTIONS (PREVIOUS LOGIC) ---
        async function assignLink() {
            const url = document.getElementById('gcashLink').value.trim();
            if (!url) return;
            db.ref('AvailLinks').push({ url, status: 'available', beneficiary: 'NONE', timestamp: Date.now() });
            document.getElementById('gcashLink').value = '';
        }

        // Realtime Table & Other functions remain similar but with better UI output...
        // (Include your checkWhitelistRealtime and handleWhitelistAction here)
        
        async function checkWhitelistRealtime() {
            const num = document.getElementById('whiteNum').value.trim();
            const btn = document.getElementById('whiteBtn');
            if (num.length === 11) {
                const snap = await db.ref('whitelist/' + num).once('value');
                if (snap.exists()) {
                    btn.innerText = "REMOVE ACCESS";
                    btn.className = "btn-app btn-sec-red";
                } else {
                    btn.innerText = "GAIN ACCESS";
                    btn.className = "btn-app btn-sec-green";
                }
            }
        }

        async function handleWhitelistAction() {
            const num = document.getElementById('whiteNum').value.trim();
            const btn = document.getElementById('whiteBtn');
            if (num.length !== 11) return;
            if (btn.innerText === "REMOVE ACCESS") {
                await db.ref('whitelist/' + num).remove();
            } else {
                await db.ref('whitelist/' + num).set({ addedAt: Date.now() });
            }
            document.getElementById('whiteNum').value = '';
            checkWhitelistRealtime();
        }
    </script>
</body>
</html>
