<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FS Admin | Pro Control</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ph-blue: #0038a8; --ph-red: #ce1126; --ph-yellow: #fcd116; --ph-green: #00b159; --dark: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; background: #f1f5f9; min-height: 100vh; color: var(--dark);
            display: none; /* Auto-hide for Security */
        }

        /* --- SUBTLE TITLE LIGHTS --- */
        .header-app {
            padding: 40px 20px 25px; text-align: center; background: white;
            border-bottom: 4px solid var(--ph-yellow); position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 0 0 25px 25px;
        }

        .title-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px; display: flex; overflow: hidden;
        }
        .light-unit { flex: 1; height: 100%; opacity: 0; transition: 0.3s; }
        
        /* Active State Lights (Ambulance Style) */
        .mode-strict .l-red { background: var(--ph-red); animation: flash 0.4s infinite alternate; opacity: 1; }
        .mode-strict .l-blue { background: var(--ph-blue); animation: flash 0.4s infinite alternate-reverse; opacity: 1; }
        
        /* Off State Lights (Steady Color) */
        .mode-open .l-yellow { background: var(--ph-yellow); opacity: 1; }
        .mode-open .l-green { background: var(--ph-green); opacity: 1; }

        @keyframes flash { from { opacity: 1; } to { opacity: 0.2; } }

        .flag-text {
            font-family: 'Quicksand', sans-serif; font-size: 26px; font-weight: 900;
            background: linear-gradient(to bottom, var(--ph-blue) 45%, #fff 45%, var(--ph-yellow) 50%, var(--ph-red) 55%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        /* --- SLIDE SWITCH DESIGN --- */
        .switch-container {
            display: flex; flex-direction: column; align-items: center; margin: 20px 0;
        }
        .toggle-switch {
            position: relative; width: 80px; height: 40px;
            appearance: none; background: #cbd5e1; border-radius: 20px;
            outline: none; cursor: pointer; transition: 0.4s;
        }
        .toggle-switch:checked { background: var(--ph-red); }
        .toggle-switch::before {
            content: ''; position: absolute; width: 32px; height: 32px;
            border-radius: 50%; top: 4px; left: 4px; background: white;
            transition: 0.4s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toggle-switch:checked::before { transform: translateX(40px); }

        /* --- APP COMPONENTS --- */
        .container { padding: 15px; }
        details { background: white; border-radius: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        summary { padding: 20px; font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        summary::after { content: '＋'; color: var(--ph-blue); transition: 0.3s; }
        details[open] summary::after { content: '－'; transform: rotate(180deg); }
        .content { padding: 0 20px 20px 20px; border-top: 1px solid #f8fafc; padding-top: 15px; }

        .btn-app {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; margin-bottom: 8px;
        }
        .btn-green { background: var(--ph-green); color: white; }
        .btn-red { background: var(--ph-red); color: white; }
        .btn-blue { background: var(--ph-blue); color: white; }

        input {
            width: 100%; background: #f8fafc; border: 2px solid #e2e8f0;
            padding: 15px; border-radius: 12px; margin-bottom: 10px; outline: none;
        }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body id="mainBody">

    <div id="auth-overlay">
        <h2 class="flag-text">Verifying...</h2>
    </div>

    <div class="header-app" id="headerBrand">
        <div class="title-light">
            <div class="light-unit l-red"></div>
            <div class="light-unit l-blue"></div>
            <div class="light-unit l-yellow"></div>
            <div class="light-unit l-green"></div>
        </div>
        <h1 class="flag-text">FreeShoppingPH Admin</h1>
        <p id="modeStatus" style="font-size: 10px; font-weight: 900; margin-top: 5px;"></p>
    </div>

    <div class="container">
        
        <details class="exclusive-tab">
            <summary>Claiming Portal Links</summary>
            <div class="content">
                <textarea id="gcashLink" rows="2" placeholder="Paste GCash Link..." style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd;"></textarea>
                <button class="btn-app btn-blue" onclick="assignLink()">ASSIGN PORTAL LINK</button>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>System Access Control</summary>
            <div class="content">
                <div class="switch-container">
                    <p style="font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px;">STRICT MODE SWITCH</p>
                    <input type="checkbox" id="masterSwitch" class="toggle-switch" onchange="toggleSystem()">
                </div>
                
                <input type="tel" id="targetNum" placeholder="09xxxxxxxxx">
                <div style="display: flex; gap: 8px;">
                    <button class="btn-app btn-green" onclick="handleAccess('whitelist')">GAIN ACCESS</button>
                    <button class="btn-app btn-red" onclick="handleAccess('blacklist')">RESTRICTED</button>
                </div>
                <button class="btn-app" style="background:#64748b; color:white;" onclick="removeAccess()">REMOVE ACCESS</button>
            </div>
        </details>

        <details class="exclusive-tab">
            <summary>Live Monitoring</summary>
            <div class="content" id="monitoringList">
                <p style="text-align:center; font-size:11px; color:gray;">Fetching records...</p>
            </div>
        </details>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
            authDomain: "freeshoppingph-3bade.firebaseapp.com",
            databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
            projectId: "freeshoppingph-3bade",
            storageBucket: "freeshoppingph-3bade.appspot.com",
            messagingSenderId: "1028308831969",
            appId: "1:1028308831969:web:96e224e75d69ba74332924"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- SECURITY ---
        function getSig() {
            return btoa(navigator.userAgent + screen.width + screen.height).substring(0, 16);
        }
        const mySig = getSig();

        async function verifyAdmin() {
            const snap = await db.ref('authorized_admins').once('value');
            let authorized = false;
            snap.forEach(child => { if(child.val().signature === mySig) authorized = true; });
            
            if(authorized) {
                document.getElementById('auth-overlay').remove();
                document.getElementById('mainBody').style.display = 'block';
            } else {
                document.getElementById('auth-overlay').innerHTML = `<h2 style="color:red">DENIED</h2><p style="font-size:10px">SIG: ${mySig}</p>`;
            }
        }
        verifyAdmin();

        // --- MASTER SWITCH LOGIC ---
        db.ref('system_status').on('value', snap => {
            const mode = snap.val()?.mode || 'strict';
            const isStrict = mode === 'strict';
            document.getElementById('masterSwitch').checked = isStrict;
            
            const header = document.getElementById('headerBrand');
            const statusLabel = document.getElementById('modeStatus');
            
            if(isStrict) {
                header.className = "header-app mode-strict";
                statusLabel.innerText = "STRICT MODE ACTIVE";
                statusLabel.style.color = "var(--ph-red)";
            } else {
                header.className = "header-app mode-open";
                statusLabel.innerText = "SYSTEM OPEN";
                statusLabel.style.color = "var(--ph-green)";
            }
        });

        function toggleSystem() {
            const isChecked = document.getElementById('masterSwitch').checked;
            db.ref('system_status').update({ mode: isChecked ? 'strict' : 'open' });
        }

        // --- ACCESS CONTROL ---
        function handleAccess(type) {
            const num = document.getElementById('targetNum').value.trim();
            if(num.length < 11) return alert("Invalid Number");
            db.ref(type + '/' + num).set({ timestamp: Date.now() });
            alert(num + " is now " + type.toUpperCase());
            document.getElementById('targetNum').value = '';
        }

        function removeAccess() {
            const num = document.getElementById('targetNum').value.trim();
            if(!num) return;
            db.ref('whitelist/' + num).remove();
            db.ref('blacklist/' + num).remove();
            alert("Access Revoked for " + num);
        }

        // --- ACCORDION LOGIC ---
        const tabs = document.querySelectorAll('.exclusive-tab');
        tabs.forEach(t => {
            t.addEventListener('toggle', () => {
                if(t.open) tabs.forEach(other => { if(other !== t) other.removeAttribute('open'); });
            });
        });

        async function assignLink() {
            const url = document.getElementById('gcashLink').value.trim();
            if(!url) return;
            await db.ref('AvailLinks').push({ url, status: 'available', time: Date.now() });
            document.getElementById('gcashLink').value = '';
            alert("Link Updated!");
        }
    </script>
</body>
</html>
