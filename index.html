// 1. AUTO-INTENT BYPASS (No Button Needed)
function autoIntentBypass() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isFacebook = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1);
    
    if (isFacebook && /Android/i.test(ua)) {
        // Kunin ang current URL at alisin ang http/https protocol
        const cleanUrl = window.location.href.split('://')[1];
        
        // Pilitin lumabas sa Messenger at mag-open sa Chrome
        // Ang "intent://" ay parang "Refresh" pero sa external browser
        window.location.href = `intent://${cleanUrl}#Intent;scheme=https;package=com.android.chrome;end`;
    }
}

// 2. DEVICE FINGERPRINT (Signature)
function generateSignature() {
    const data = [
        navigator.userAgent,
        screen.height + "x" + screen.width,
        navigator.language,
        navigator.hardwareConcurrency || 0
    ].join('|');
    
    let hash = 0;
    for (let i = 0; i < data.length; i++) {
        hash = ((hash << 5) - hash) + data.charCodeAt(i);
        hash |= 0;
    }
    return "SIG-" + Math.abs(hash);
}

const deviceSig = generateSignature();

// RUN IMMEDIATELY ON LOAD
window.onload = function() {
    autoIntentBypass(); // Auto-jump out of FB
    
    // Mobile Check
    const ua = navigator.userAgent;
    if (!/Android|webOS|iPhone|iPad|iPod/i.test(ua)) {
        document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:50px;'>MOBILE ONLY ACCESS</h2>";
    }
};

// 3. LOGIN LOGIC WITH BLACKLIST & SIGNATURE RULES
async function handleLogin() {
    const phone = document.getElementById('phoneInput').value.trim();
    const btn = document.getElementById('loginBtn');

    if (phone.length !== 11) return alert("Enter valid 11-digit number.");

    btn.disabled = true;
    btn.innerText = "VERIFYING...";

    try {
        // A. Local Storage Lock (Device-based blacklist)
        if (localStorage.getItem('is_claimed') === 'true') {
            alert("This beneficiary was already claimed.");
            btn.disabled = false; btn.innerText = "PROCEED";
            return;
        }

        // B. Database Check (Phone number OR Device Signature)
        const blackPhone = await db.ref('blacklist/' + phone).once('value');
        const blackSig = await db.ref('blacklisted_devices/' + deviceSig).once('value');

        if (blackPhone.exists() || blackSig.exists()) {
            localStorage.setItem('is_claimed', 'true'); // Permanent lock on this browser
            alert("This beneficiary was already claimed.");
            btn.disabled = false; btn.innerText = "PROCEED";
            return;
        }

        // C. System Mode Check (Admin Switch)
        const modeSnap = await db.ref('system_status/mode').once('value');
        const mode = modeSnap.val() || 'strict';

        if (mode === 'open') {
            grantAccess(phone);
        } else {
            // STRICT MODE: Check Whitelist
            const whiteSnap = await db.ref('whitelist/' + phone).once('value');
            if (whiteSnap.exists()) {
                grantAccess(phone);
            } else {
                alert("System Notice: Access is currently limited. Try again later.");
                btn.disabled = false; btn.innerText = "PROCEED";
            }
        }
    } catch (err) {
        alert("Connection Error.");
        btn.disabled = false;
    }
}

function grantAccess(phone) {
    sessionStorage.setItem('user_phone', phone);
    sessionStorage.setItem('user_sig', deviceSig);
    window.location.href = "main.html";
}
