// 1. GENERATE DEVICE SIGNATURE (Fingerprint)
function getDeviceSignature() {
    const specs = [
        navigator.userAgent,
        screen.height,
        screen.width,
        navigator.hardwareConcurrency,
        navigator.language
    ].join('|');
    // Simple hash function para maging "Signature" string
    let hash = 0;
    for (let i = 0; i < specs.length; i++) {
        hash = ((hash << 5) - hash) + specs.charCodeAt(i);
        hash |= 0;
    }
    return "SIG-" + Math.abs(hash);
}

const deviceSig = getDeviceSignature();

// 2. ANDROID INTENT / BROWSER CHECK
function checkEnvironment() {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isFacebook = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1);
    
    if (isFacebook && /Android/i.test(ua)) {
        // Pilitin lumabas sa Messenger/FB App
        const currentUrl = window.location.href.replace(/https?:\/\//, "");
        window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
    }

    // Mobile Only Logic
    if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
        document.body.innerHTML = "<div style='padding:50px; text-align:center; color:red; font-weight:bold;'>MOBILE DEVICE ONLY: Please use your smartphone to access this portal.</div>";
    }
}

window.onload = checkEnvironment;

// 3. LOGIN & RULES LOGIC
async function handleLogin() {
    const phoneInput = document.getElementById('phoneInput').value.trim();
    const btn = document.getElementById('loginBtn');

    if (phoneInput.length !== 11) return alert("Enter 11-digit number.");

    btn.disabled = true;
    btn.innerText = "VERIFYING...";

    try {
        // Check if device is locally blacklisted
        if (localStorage.getItem('sys_restricted') === 'true') {
            alert("This beneficiary was already claimed.");
            btn.disabled = false; return;
        }

        // Check Database for Phone OR Device Signature sa Blacklist
        const blackByPhone = await db.ref('blacklist/' + phoneInput).once('value');
        const blackBySig = await db.ref('blacklisted_devices/' + deviceSig).once('value');

        if (blackByPhone.exists() || blackBySig.exists()) {
            // Re-enforce local storage if database found them
            localStorage.setItem('sys_restricted', 'true');
            alert("This beneficiary was already claimed.");
            btn.disabled = false;
            return;
        }

        // Check System Mode (Open/Strict)
        const modeSnap = await db.ref('system_status/mode').once('value');
        const mode = modeSnap.val() || 'strict';

        if (mode === 'open') {
            proceed(phoneInput);
        } else {
            // Strict Mode: Only Whitelisted
            const whiteSnap = await db.ref('whitelist/' + phoneInput).once('value');
            if (whiteSnap.exists()) {
                proceed(phoneInput);
            } else {
                alert("System Notice: Access is currently limited. Try again later.");
                btn.disabled = false;
            }
        }

    } catch (e) {
        alert("Verification failed. Check connection.");
        btn.disabled = false;
    }
}

function proceed(phone) {
    sessionStorage.setItem('user_phone', phone);
    sessionStorage.setItem('user_sig', deviceSig);
    window.location.href = "main.html";
}
