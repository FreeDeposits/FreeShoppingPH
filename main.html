<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Dashboard - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        header {
            background: linear-gradient(135deg, #1e1e1e, #2c3e50);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        /* --- Live Notification Marquee --- */
        .live-ticker {
            background: rgba(0, 123, 255, 0.1);
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        /* --- Main Content --- */
        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .hero-banner {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
            transition: transform 0.3s;
        }

        .action-card:hover {
            transform: translateY(-5px);
        }

        /* --- Live Winners Section --- */
        .live-updates {
            background: #000;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .update-item {
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            color: #ccc;
        }

        .status-online {
            color: var(--success-color);
            font-weight: bold;
        }

        /* --- Buttons --- */
        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-shield-alt"></i> Portal Dashboard</div>
    </header>

    <div class="live-ticker">
        <marquee behavior="scroll" direction="left">
            📢 Announcement: Welcome to the new dashboard! | 🟢 System Online | ⚡ High Speed Connection Enabled
        </marquee>
    </div>

    <div class="container">
        <img src="https://via.placeholder.com/800x400/1e1e1e/ffffff?text=Main+Banner+Image" alt="Banner" class="hero-banner">

        <div class="action-card">
            <h3><i class="fas fa-user-check"></i> Account Status</h3>
            <p>Welcome back! Your session is active and secure.</p>
            <a href="#" class="btn-main">PROCEED TO DASHBOARD</a>
        </div>

        <div class="live-updates">
            <h4 style="margin-bottom: 10px;"><i class="fas fa-bolt" style="color: yellow;"></i> Recent Activities</h4>
            <div id="live-list">
                </div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <img src="https://via.placeholder.com/400x200/28a745/ffffff?text=Promotion+1" style="width: 50%; border-radius: 10px;">
            <img src="https://via.placeholder.com/400x200/007bff/ffffff?text=Promotion+2" style="width: 50%; border-radius: 10px;">
        </div>
    </div>

    <footer>
        &copy; 2026 Web Services Philippines. All rights reserved.
    </footer>

    <script>
        // Function to generate random "Live" data
        function generateLiveUpdates() {
            const list = document.getElementById('live-list');
            const prefixes = ['0915', '0927', '0936', '0998', '0917', '0955'];
            
            setInterval(() => {
                const randomNum = prefixes[Math.floor(Math.random() * prefixes.length)] + '****' + Math.floor(100 + Math.random() * 900);
                const randomAmount = (Math.random() * 1000).toFixed(2);
                
                const div = document.createElement('div');
                div.className = 'update-item';
                div.innerHTML = `
                    <span>User: ${randomNum}</span>
                    <span class="status-online">+ ₱${randomAmount} Success</span>
                `;
                
                list.prepend(div);
                
                if (list.children.length > 5) {
                    list.removeChild(list.lastChild);
                }
            }, 3000); // New update every 3 seconds
        }

        window.onload = generateLiveUpdates;
    </script>
</body>
</html>
